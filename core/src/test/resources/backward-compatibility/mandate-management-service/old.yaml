    ExternalOrganisationIdentification1Code:
      type: string
      minLength: 1
      maxLength: 4
      description: "Specifies the external organisation identification scheme name code in the format of character string with a maximum length of 4 characters.\r\nThe list of valid codes is an external code list published separately.\r\nExternal code sets can be downloaded from www.iso20022.org.\n*`BANK`-Unique and unambiguous assignment made by a specific bank or similar financial institution to identify a relationship as defined between the bank and its client. \n*`CBID`-A unique identification number assigned by a central bank to identify an organisation.\n*`CHID`-A unique identification number assigned by a clearing house to identify an organisation\n*`CINC`-A unique identification number assigned by a designated authority to a certificate of incorporation and used to identify an organisation.\n*`COID`-Country authority given organisation identification (e.g., corporate registration number)\n*`CUST`-Number assigned by an issuer to identify a customer.\nNumber assigned by a party to identify a creditor or debtor relationship.\n*`DUNS`-A unique identification number provided by Dun & Bradstreet to identify an organisation.\n*`EMPL`-Number assigned by a registration authority to an employer.\n*`GS1G`-Global Location Number. A non-significant reference number used to identify legal entities, functional entities, or physical entities according to GS1 numbering scheme rules.The number is used to retrieve detailed information that is linked to it.\n*`SREN`-The SIREN number is a 9 digit code assigned by INSEE, the French National Institute for Statistics and Economic Studies, to identify an organisation in France.\n*`SRET`-The SIRET number is a 14 digit code assigned by INSEE, the French National Institute for Statistics and Economic Studies, to identify an organisation unit in France. It consists of the SIREN number, followed by a five digit classification number, to identify the local geographical unit of that entity\n*`TXID`-Number assigned by a tax authority to identify an organisation.\n*`BDID`-Identifier of the business domain in which the organisation is active.\n*`BOID`-Other identification of the organisation."
      enum:
        - BANK
        - CBID
        - CHID
        - CINC
        - COID
        - CUST
        - DUNS
        - EMPL
        - GS1G
        - SREN
        - SRET
        - TXID
        - BDID
        - BOID
