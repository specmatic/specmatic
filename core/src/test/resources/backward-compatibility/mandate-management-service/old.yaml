      maxLength: 350
    nppBackOfficeService:
      type: string
      description: |
        NPP back office service identifier (Mandate Service ID).
        Specifies the payment service type for NPP PayTo mandates.
        Currently only SCT (SEPA Credit Transfer equivalent) is supported.

        **sct** - SEPA Credit Transfer equivalent service
      enum:
        - sct
      example: sct
    supplementaryDataEnvelope1:
      type: object
      description: |
        CBA extension to standard ISO20022 supplementaryDataEnvelope1.
      properties:
        nppMandateId:
          type: string
          description: NPP Mandate Identifier. UUIDv1 format without hyphens.
          example: '12345678123412341234123456789012'
          pattern: ^[0-9a-fA-F]{32}$
          minLength: 32
          maxLength: 32
        mandateDescription:
          type: string
          description: Reason for the mandate setup as narrative text. Specifies a character string with a maximum length of 140 ASCII printable characters.
          example: Monthly utility bill payment for electricity services
          minLength: 1
          maxLength: 140
        transferArrangement:
          type: string
          description: Indication of future transfer date, conditions of sale and requirement to hold funds. Specifies a character string with a maximum length of 140 characters.
          example: After property settlement on 2024-12-15, transfer funds to vendor account
          minLength: 1
          maxLength: 140
        additionalInformation:
          type: string
          description: Additional information, in free text form, to complement the mandate information. Specifies a character string with a maximum length of 140 characters.
          example: Customer reference number ABC123, contact support for queries
          minLength: 1
          maxLength: 140
        paymentExecutedNotBeforeTime:
          type: string
          pattern: ^(?:[01]\d|2[0-3]):[0-5]\d:[0-5]\d(?:\.[0-9]{1,3})?(?:Z)|(-)$
          description: Indicates that each execution of the mandate payment should not occur before a given time of that execution day. An ISOTime whereby all timezone time values are UTC.
          example: 22:00:00Z
        nppBackOfficeService:
          $ref: '#/components/schemas/nppBackOfficeService'
          description: NPP back office service identifier (Mandate Service ID). Defaults to 'sct' if not provided.
