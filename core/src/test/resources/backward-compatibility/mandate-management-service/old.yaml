    mandateCopyRequestV04:
      type: object
      description: "Scope\r\nThe MandateCopyRequest message is sent by the initiator of the request to his agent. The initiator can either be the debtor or the creditor.\r\nThe MandateCopyRequest message is forwarded by the agent of the initiator to the agent of the counterparty.\r\nA MandateCopyRequest message is used to request a copy of an existing mandate. If accepted, the mandate copy can be sent using the MandateAcceptanceReport message.\r\nUsage\r\nThe MandateCopyRequest message can contain one or more copy requests.\r\nThe messages can be exchanged between creditor and creditor agent or debtor and debtor agent and between creditor agent and debtor agent.\r\nThe message can also be used by an initiating party that has authority to send the message on behalf of the creditor or debtor.\r\nThe MandateCopyRequest message can be used in domestic and cross-border scenarios.\r\n"
      additionalProperties: false
      properties:
        groupHeader:
          description: Set of characteristics to identify the message and parties playing a role in the mandate copy request, but which are not part of the mandate.
          $ref: '#/components/schemas/groupHeader110'
        underlyingCopyRequestDetails:
          type: array
          description: Set of information used to identify the mandate for which a copy is requested.
          items:
            $ref: '#/components/schemas/mandateCopy4'
        supplementaryData:
          type: array
          description: Additional information that cannot be captured in the structured elements and/or any other specific block.
          items:
            $ref: '#/components/schemas/supplementaryData1'
      required:
        - groupHeader
        - underlyingCopyRequestDetails
    MX_pain_017_001_04:
