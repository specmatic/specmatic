    ExternalDocumentType1Code:
      type: string
      minLength: 1
      maxLength: 4
      description: "Specifies the document type as published in an external document type code list.\r\nExternal code sets can be downloaded from www.iso20022.org.\n*`CINV`-Document is an invoice.\n*`CNFA`-Document is a credit note for the final amount settled for a commercial transaction.\n*`CONT`-Document is a contract evidencing an agreement between the seller and buyer for the supply of goods and/or services.\n*`CREN`-Document is a credit note.\n*`DEBN`-Document is a debit note.\n*`DISP`-Document is an advice of dispatch of the goods.\n*`DNFA`-Document is a debit note for the final amount settled for a commercial transaction.\n*`HIRI`-Document is an invoice for the hiring of human resources or renting goods or equipment.\n*`INVS`-Document is a signed invoice.\n*`MSIN`-Document is an invoice claiming payment for the supply of metered services, eg. Gas or electricity, supplied to a fixed meter.\n*`PROF`-In trade transactions, a pro forma invoice is a document that states a commitment from the seller to sell goods to the buyer at specified prices and terms. It is used to declare the value of the trade. It is not a true invoice, because it is not used to record accounts receivable for the seller and accounts payable for the buyer.\n*`PUOR`-Document is a purchase order.\n*`QUOT`-Document is a quotation setting out the conditions under which the goods and/or services are offered.\n*`SBIN`-Document is a statement of the transactions posted to the debtor's account at the supplier.\n*`SPRR`-Document is a document presented by the seller in support of the procurement of goods and/or services.\n*`TISH`-Document is a timesheet recording times for the provision of services and/or delivery of goods.\n*`USAR`-Document is a usage report indicating the consumption pattern for designated goods and/or services.\n*`AROI`-Document is a payment that applies to a specific source document.\n*`BOLD`-Document is a shipping notice.\n*`CMCN`-Document is an agreement between the parties, stipulating the terms and conditions of the delivery of goods or services.\n*`SOAC`-Document is a statement of the transactions posted to the debtor's account at the supplier.\n*`TSUT`-Document is a transaction identifier as assigned by the Trade Services Utility.\n*`VCHR`-Document is an electronic payment document."
      enum:
        - CINV
        - CNFA
        - CONT
        - CREN
        - DEBN
        - DISP
        - DNFA
        - HIRI
        - INVS
        - MSIN
        - PROF
        - PUOR
        - QUOT
        - SBIN
        - SPRR
        - TISH
        - USAR
        - AROI
        - BOLD
        - CMCN
        - SOAC
        - TSUT
        - VCHR
