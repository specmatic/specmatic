      properties:
        id:
          type: string
          description: Unique identifier for the event.
        type:
          type: string
          description: The type of event that occurred.
        eventDateTime:
          type: string
          format: date-time
          description: The date and time when the event occurred.
        receivedDateTime:
          type: string
          format: date-time
          description: The date and time when the event was received by the system.
        source:
          type: string
          description: Indicates from where the event originated.
        category:
          type: string
          description: |
            Classification of the event type for filtering and querying purposes.

            Known values include:
