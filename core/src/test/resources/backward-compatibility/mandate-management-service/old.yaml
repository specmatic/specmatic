        mandateRequestIdentification:
          description: Identification for the mandate request, as assigned by the initiating party.
          $ref: '#/components/schemas/max35Text'
        authentication:
          description: Specifies the transport authentication details related to the mandate.
          $ref: '#/components/schemas/mandateAuthentication1'
        type:
          description: Specifies the type of mandate, such as paper, electronic or scheme.
          $ref: '#/components/schemas/mandateTypeInformation2'
        occurrences:
          description: Provides details of the duration of the mandate and occurrence of the underlying transactions.
          $ref: '#/components/schemas/mandateOccurrences5'
        trackingIndicator:
          description: Specifies whether the direct debit instructions should be automatically re-submitted periodically when bilaterally agreed.
          $ref: '#/components/schemas/trueFalseIndicator'
        firstCollectionAmount:
          description: Amount different from the collection amount, as it includes the costs associated with the first debited amount.
          $ref: '#/components/schemas/activeOrHistoricCurrencyAndAmount'
        collectionAmount:
          description: Fixed amount to be collected from the debtor's account.
          $ref: '#/components/schemas/activeOrHistoricCurrencyAndAmount'
        maximumAmount:
          description: Maximum amount that may be collected from the debtor's account, per instruction.
          $ref: '#/components/schemas/activeOrHistoricCurrencyAndAmount'
        adjustment:
          description: Specifies the characteristics of the adjustment applied to the collection amount of a direct debit instruction.
          $ref: '#/components/schemas/mandateAdjustment1'
        reason:
          description: Provides the reason for the setup of the mandate.
          $ref: '#/components/schemas/mandateSetupReason1Choice'
        creditorSchemeIdentification:
          description: Credit party that signs the mandate.
          $ref: '#/components/schemas/partyIdentification272'
        creditor:
          description: Party that signs the mandate and to whom an amount of money is due.
          $ref: '#/components/schemas/partyIdentification272'
        creditorAccount:
          description: Unambiguous identification of the account of the creditor to which a credit entry will be posted as a result of the payment transaction.
          $ref: '#/components/schemas/cashAccount40'
        creditorAgent:
          description: Financial institution servicing an account for the creditor.
          $ref: '#/components/schemas/branchAndFinancialInstitutionIdentification8'
        ultimateCreditor:
          description: Ultimate party to which an amount of money is due.
          $ref: '#/components/schemas/partyIdentification272'
        debtor:
          description: Party that signs the mandate and owes an amount of money to the (ultimate) creditor.
          $ref: '#/components/schemas/partyIdentification272'
        debtorAccount:
          description: Unambiguous identification of the account of the debtor, to which a debit entry will be made as a result of the transaction.
          $ref: '#/components/schemas/cashAccount40'
        debtorAgent:
          description: Financial institution servicing an account for the debtor.
          $ref: '#/components/schemas/branchAndFinancialInstitutionIdentification8'
        ultimateDebtor:
          description: Ultimate party that owes an amount of money to the (ultimate) creditor.
          $ref: '#/components/schemas/partyIdentification272'
        mandateReference:
          description: Reference assigned by a creditor or ultimate creditor for internal usage for the mandate.
          $ref: '#/components/schemas/max35Text'
        referredDocument:
          type: array
