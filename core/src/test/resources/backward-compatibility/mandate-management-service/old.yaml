openapi: 3.1.0
info:
  title: Mandates Management Service
  version: v2.0
  description: |
    Payment Mandate Management Service Domain API.

    This is the ISO20022-compliant API for managing payment mandates within CBA.

    Currently all mandates are backed by NPP PayTo mandates.
    We maintain a copy of all mandates to support additional features not provided by NPP.

    Current features:
    - **Create**: Initiate a new mandates, this is an async process.
    - **Get**: Access mandate details and current status.

    Planned features:
    - **Amend**: Modify existing mandate details (e.g., amount, frequency).
    - **Authorise**: Support mandate authorisation workflows as required.
    - **Port**: Facilitate mandate transfers between initiating parties.
    - **Bulk**: Enable batch processing of mandate operations.
  termsOfService: https://cba.com.au/api/terms
  x-cba-api-platform-domain: Payment Services-PaaS
  license:
    name: Commonwealth Bank API License
    url: https://cba.com.au/api/license
  x-metadata:
    metadata-version: v1.0
    visibility: Partner
    api-type: REST
    category: Service
    business-unit: Business Banking
    technical-service-ci: CI013742401
    service-domain-grouping: Payments
    service-domain: Payment Mandate Management
    function: Read_Write
    internet-facing: 'Y'
    future-intent: Invest
    auth-type: OIDC
    usage-metrics: 'Y'
    data-classification: Group Use
    depends-on-legacy-integration: 'N'
    ownership: Internal
servers:
  - url: https://testadsfsdf.test.au.internal.cba
    description: Dev server
tags:
