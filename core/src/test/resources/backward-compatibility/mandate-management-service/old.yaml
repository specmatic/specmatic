    proprietaryCategoryPurpose1Code:
      type: string
      minLength: 1
      maxLength: 35
      description: |
        CBA proprietary category purpose codes for use in CategoryPurpose1Choice.proprietary field.
        Provides detailed business categorization beyond standard external codes.

        **MORT** - Mortgage payments and housing loan transactions
        **UTIL** - Utility payments (electricity, gas, water, telecoms)
        **DEPD** - Dependent care payments (childcare, eldercare)
        **GAMP** - Gaming and entertainment industry payments
        **RETL** - Retail merchant payments and transactions
        **PERS** - Personal payments between individuals
      enum:
        - MORT
        - UTIL
        - DEPD
        - GAMP
        - RETL
        - PERS
    categoryPurpose1Choice:
      type: object
      description: |-
        Specifies the high level purpose of the instruction based on a set of pre-defined categories.
        Usage: This is used by the initiating party to provide information concerning the processing of the payment. It is likely to trigger special processing by any of the agents involved in the payment chain.
      additionalProperties: false
      oneOf:
        - type: object
          additionalProperties: false
          properties:
            code:
              description: Category purpose, as published in an external category purpose code list.
              $ref: '#/components/schemas/ExternalCategoryPurpose1Code'
          required:
            - code
        - type: object
          additionalProperties: false
          properties:
            proprietary:
              description: CBA proprietary code
              $ref: '#/components/schemas/proprietaryCategoryPurpose1Code'
          required:
            - proprietary
    mandateClassification1Code:
      type: string
      description: |-
        Specifies the type of direct debit amount, such as fixed or variable.
        *`FIXE`-Direct debit amount is fixed.
        *`USGB`-Direct debit amount is based on usage.
        *`VARI`-Direct debit amount is variable.
      enum:
        - FIXE
        - USGB
        - VARI
    proprietaryMandateClassification1Code:
      type: string
      minLength: 1
      maxLength: 35
      description: |
        CBA proprietary mandate classification codes for use in MandateClassification1Choice.proprietary field.
        Extends standard ISO20022 values (FIXE, USGB, VARI) with CBA-specific business requirements.

        **BALN** - Payment amount is fixed with large final payment amount (balloon payment)
      enum:
        - BALN
    mandateClassification1Choice:
      type: object
      description: |-
        Specifies the high level purpose of the instruction based on a set of pre-defined categories.
        Usage: This is used by the initiating party to provide information concerning the processing of the payment. It is likely to trigger special processing by any of the agents involved in the payment chain.
      additionalProperties: false
      oneOf:
        - type: object
          additionalProperties: false
          properties:
            code:
              description: Category purpose, as published in an external category purpose code list.
              $ref: '#/components/schemas/mandateClassification1Code'
          required:
            - code
        - type: object
          additionalProperties: false
          properties:
            proprietary:
              description: CBA proprietary code
              $ref: '#/components/schemas/proprietaryMandateClassification1Code'
          required:
            - proprietary
    mandateTypeInformation2:
      type: object
      description: Set of elements used to further detail the information related to the type of payment.
      additionalProperties: false
      properties:
        serviceLevel:
          description: Agreement under which or rules under which the mandate resides.
          $ref: '#/components/schemas/serviceLevel8Choice'
        localInstrument:
          description: 'User community specific instrument. Usage: This element is used to specify a local instrument, local clearing option and/or further qualify the service or service level.'
          $ref: '#/components/schemas/localInstrument2Choice'
        categoryPurpose:
          description: Specifies the high level purpose of the mandate based on a set of pre-defined categories.
          $ref: '#/components/schemas/categoryPurpose1Choice'
        classification:
          description: Type of direct debit instruction.
          $ref: '#/components/schemas/mandateClassification1Choice'
    sequenceType2Code:
      type: string
      description: |-
        Specifies whether a once off transaction is covered or whether recurring transactions are covered.
        *`RCUR`-Direct debit instruction where the debtor's authorisation is used for regular direct debit transactions initiated by the creditor.
        *`OOFF`-Direct debit instruction where the debtor's authorisation is used to initiate one single direct debit transaction.
      enum:
        - RCUR
        - OOFF
    frequency6Code:
      type: string
      description: |-
        Specifies the regularity of an event.
        *`YEAR`-Event takes place every year or once a year.
        *`MNTH`-Event takes place every month or once a month.
        *`QURT`-Event takes place every three months or four times a year.
        *`MIAN`-Event takes place every six months or two times a year.
        *`WEEK`-Event takes place once a week.
        *`DAIL`-Event takes place every day.
        *`ADHO`-Event takes place on request or as necessary.
        *`INDA`-Event takes place several times a day.
        *`FRTN`-Event takes place every two weeks.
      enum:
        - YEAR
        - MNTH
        - QURT
        - MIAN
        - WEEK
        - DAIL
        - ADHO
        - INDA
        - FRTN
    decimalNumber:
