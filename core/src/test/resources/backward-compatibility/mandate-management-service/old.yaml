    ExternalMandateStatus1Code:
      type: string
      minLength: 1
      maxLength: 4
      description: "Specifies the external mandate status code in the format of character string with a maximum length of 4 characters.\r\nThe list of valid codes is an external code list published separately.\r\nExternal code sets can be downloaded from www.iso20022.org.\n*`ACTV`-The mandate is active.\n*`CANC`-The mandate is cancelled.\n*`EXPI`-The mandate has passed the end date.\n*`SUSP`-The mandate is put on hold.\n*`RCVD`-The mandate data has been received by the related agent.\n*`RJCT`-The mandate data has been rejected.\n*`PATC`-The mandate initiation needs multiple authentications, where some but not yet all have been performed. Syntactical and semantical validations are successful."
      enum:
        - ACTV
        - CANC
        - EXPI
        - SUSP
        - RCVD
        - RJCT
        - PATC
