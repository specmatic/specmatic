    ExternalMandateReason1Code:
      type: string
      minLength: 1
      maxLength: 4
      description: "Specifies the external mandate processing reason code in the format of character string with a maximum length of 4 characters.\r\nThe list of valid codes is an external code list published separately.\r\nExternal code sets can be downloaded from www.iso20022.org.\n*`AC01`-Format of the account number specified is not correct\n*`AC04`-Account number specified has been closed on the Receiver's books\n*`AC06`-Account specified is blocked, prohibiting posting of transactions against it.\n*`AG01`-Transaction forbidden on this type of account (formerly NoAgreement)\n*`AG02`-Bank Operation code specified in the message is not valid for receiver\n*`AM02`-Specific transaction/message amount is greater than allowed maximum\n*`AM03`-Specified message amount is a non processable currency outside of existing agreement\n*`AM05`-Duplication \n*`BE01`-Identification of end customer is not consistent with associated account number. (formerly CreditorConsistency).\n*`BE04`-Specification of creditor's address, which is required for payment, is missing/not correct (formerly IncorrectCreditorAddress).\n*`BE05`-Party who initiated the message is not recognised by the end customer\n*`BE06`-End customer specified is not known at associated Sort/National Bank Code or does no longer exist in the books\n*`BE07`-Specification of debtor's address, which is required for payment, is missing/not correct.\n*`DT01`-Invalid date (eg, wrong settlement date)\n*`FF01`-File format incomplete or invalid\n*`MD01`-No Mandate\n*`MD02`-Mandate related information data required by the scheme is missing.\n*`MD07`-End customer is deceased.\n*`MD08`-Receiving agent does not offer specified Mandate services\n*`MD09`-Account is not open to specified Mandates services\n*`MD10`-Account is not open to specified Mandates services for this particular creditor\n*`MD11`-Agent to whom the message needs to be forwarded cannot be located\n*`MD12`-Mandate identification is not unique to the creditor\n*`MD13`-There is a problem with the customer authentication\n*`MD14`-Agent in the payment workflow is incorrect\n*`MD15`-Currency of the transaction is incorrect\n*`MD16`-Cancellation/amendment requested by the debtor\n*`MD17`-Cancellation/amendment requested by the creditor\n*`MD18`-Cancellation/amendment requested by the creditor and the debtor\n*`MD19`-Mandate cancellation following early reimbursement of the debit by the debtor\n*`MD20`-Mandate cancellation following validity expiration\n*`MD21`-Mandate cancellation due to suspected fraud\n*`MD22`-Mandate cancellation following mandate initiation cancellation\n*`MD23`-Mandate cancellation following mandate amendment cancellation\n*`MS02`-Reason has not been specified by end customer\n*`MS03`-Reason has not been specified by agent.\n*`NARR`-Reason is provided as narrative information in the additional reason information.\n*`RC01`-Bank Identifier code specified in the message has an incorrect format (formerly IncorrectFormatForRoutingCode).\n*`RF01`-Transaction reference is not unique within the message.\n*`RR01`-Specification of the debtor’s account or unique identification needed for reasons of regulatory requirements is insufficient or missing\n*`RR02`-Specification of the debtor’s name and/or address needed for regulatory requirements is insufficient or missing.\n*`RR03`-Specification of the creditor’s name and/or address needed for regulatory requirements is insufficient or missing.\n*`RR04`-Regulatory Reason\n*`SL01`-Due to specific service offered by the Debtor Agent\n*`SL11`-Whitelisting service offered by the Debtor Agent; Debtor has not included the Creditor on its “Whitelist” (yet). In the Whitelist the Debtor may list all allowed Creditors to debit Debtor bank account.\n*`SL12`-Blacklisting service offered by the Debtor Agent; Debtor included the Creditor on his “Blacklist”. In the Blacklist the Debtor may list all Creditors not allowed to debit Debtor bank account.\n*`SL13`-Due to Maximum allowed Direct Debit Transactions per period service offered by the Debtor Agent.\n*`SL14`-Due to Maximum allowed Direct Debit Transaction amount service offered by the Debtor Agent."
      enum:
        - AC01
        - AC04
        - AC06
        - AG01
        - AG02
        - AM02
        - AM03
        - AM05
        - BE01
        - BE04
        - BE05
        - BE06
        - BE07
        - DT01
        - FF01
        - MD01
        - MD02
        - MD07
        - MD08
        - MD09
        - MD10
        - MD11
        - MD12
        - MD13
        - MD14
        - MD15
        - MD16
        - MD17
        - MD18
        - MD19
        - MD20
        - MD21
        - MD22
        - MD23
        - MS02
        - MS03
        - NARR
        - RC01
        - RF01
        - RR01
        - RR02
        - RR03
        - RR04
        - SL01
        - SL11
        - SL12
        - SL13
        - SL14
