    max35Text:
      type: string
      description: Specifies a character string with a maximum length of 35 characters.
      minLength: 1
      maxLength: 35
    iSODateTime:
      type: string
      description: |-
        A particular point in the progression of time defined by a mandatory date and a mandatory time component, expressed in either UTC time format (YYYY-MM-DDThh:mm:ss.sssZ), local time with UTC offset format (YYYY-MM-DDThh:mm:ss.sss+/-hh:mm), or local time format (YYYY-MM-DDThh:mm:ss.sss). These representations are defined in "XML Schema Part 2: Datatypes Second Edition - W3C Recommendation 28 October 2004" which is aligned with ISO 8601.
        Note on the time format:
        1) beginning / end of calendar day
        00:00:00 = the beginning of a calendar day
        24:00:00 = the end of a calendar day
        2) fractions of second in time format
        Decimal fractions of seconds may be included. In this case, the involved parties shall agree on the maximum number of digits that are allowed.
      pattern: ^(?:[1-9]\d{3}-(?:(?:0[1-9]|1[0-2])-(?:0[1-9]|1\d|2[0-8])|(?:0[13-9]|1[0-2])-(?:29|30)|(?:0[13578]|1[02])-31)|(?:[1-9]\d(?:0[48]|[2468][048]|[13579][26])|(?:[2468][048]|[13579][26])00)-02-29)T(?:[01]\d|2[0-3]):[0-5]\d:[0-5]\d(?:\.[0-9]+)?(?:Z|[+-][01]\d:[0-5]\d)?$
    authorisation1Code:
      type: string
      description: |-
        Specifies the level of approval depending on a number of factors, including payment type, threshold amount or local country or operations practice.
        *`AUTH`-Indicates a file has been pre authorised or approved within the originating customer environment and no further approval is required.
        *`FDET`-Indicates that a file requires additional file level approval, with the ability to view both the payment information block and supporting customer credit transaction detail.
        *`FSUM`-Indicates that a file requires additional file level approval, with the ability to view only the payment information block level information.
        *`ILEV`-Indicates that a file requires all customer transactions to be authorised or approved.
      enum:
        - AUTH
        - FDET
        - FSUM
        - ILEV
    proprietaryAuthorisation1Code:
      type: string
      minLength: 1
      maxLength: 35
      description: CBA proprietary code
    authorisation1Choice:
