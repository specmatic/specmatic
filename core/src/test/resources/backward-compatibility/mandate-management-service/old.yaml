            - `MANDATE_STATUS_CHANGED` - Mandate status changed (suspend, unsuspend, cancel)
            - `MANDATE_AMENDED` - Mandate details amended
          example: MANDATE_STATUS_CHANGED
          default: UNKNOWN
        details:
          type: object
          description: Event-specific details that vary based on the event type. Contains additional context and data relevant to the specific event.
          additionalProperties: true
      required:
