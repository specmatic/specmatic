    mandateAmendmentRequestV08:
      type: object
      description: "Scope\r\nThe MandateAmendmentRequest message is sent by the initiator of the request to his agent and/or counterparty. The initiator can both be the debtor or the creditor (or where appropriate the debtor agent).\r\nThe MandateAmendmentRequest message is forwarded by the agent of the initiator to the agent of the counterparty.\r\nA MandateAmendmentRequest message is used to request the amendment of specific information in an existing mandate. The MandateAmendmentRequest message must reflect the new data of the element(s) to be amended and at a minimum a unique reference to the existing mandate. If accepted, this MandateAmendmentRequest message together with the MandateAcceptanceReport message confirming the acceptance will be considered as a valid amendment on an existing mandate, agreed upon by all parties. The amended mandate will from then on be considered the valid mandate.\r\nUsage\r\nThe MandateAmendmentRequest message can contain one or more request(s) to amend a specific mandate.\r\nThe messages can be exchanged between creditor and creditor agent or debtor and debtor agent and between creditor agent and debtor agent.\r\nThe message can also be used by an initiating party that has authority to send the message on behalf of the creditor or debtor.\r\nThe MandateAmendmentRequest message can be used in domestic and cross-border scenarios.\r\nIf all elements in the existing Mandate need to be amended or the underlying contract is different, then the MandateAmendmentRequest message should not be used. The existing Mandate has to be cancelled and a new Mandate has to be initiated."
      additionalProperties: false
      properties:
        groupHeader:
          description: Set of characteristics to identify the message and parties playing a role in the amendment of the mandate, but which are not part of the mandate.
          $ref: '#/components/schemas/groupHeader110'
        underlyingAmendmentDetails:
          type: array
          description: Set of elements used to provide details on the amendment request.
          items:
            $ref: '#/components/schemas/mandateAmendment8'
        supplementaryData:
          type: array
          description: Additional information that cannot be captured in the structured elements and/or any other specific block.
          items:
            $ref: '#/components/schemas/supplementaryData1'
      required:
        - groupHeader
        - underlyingAmendmentDetails
