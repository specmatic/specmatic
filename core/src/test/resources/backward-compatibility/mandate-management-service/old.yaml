    ExternalServiceLevel1Code:
      type: string
      minLength: 1
      maxLength: 4
      description: "Specifies the external service level code in the format of character string with a maximum length of 4 characters.\r\nThe list of valid codes is an external code list published separately.\r\nExternal code sets can be downloaded from www.iso20022.org.\n*`BKTR`-Payment through internal book transfer.\n*`G001`-Tracked Customer Credit Transfer.\n*`G002`-Tracked Stop and Recall \n*`G003`-Tracked Outbound Corporate Transfer.\n*`G004`-Tracked Financial Institution Transfer.\n*`NPCA`-Payments must be executed following the NPC Area Payment scheme.\n*`NUGP`-Payment must be executed as a non-urgent transaction with priority settlement.\n*`NURG`-Payment must be executed as a non-urgent transaction, which is typically identified as an ACH or low value transaction. \n*`PRPT`-Transaction must be processed according to the EBA Priority Service.\n*`SDVA`-Payment must be executed with same day value to the creditor.\n*`SEPA`-Payment must be executed following the Single Euro Payments Area scheme.\n*`SVDE`-Payment execution following the cheque agreement and traveller cheque agreement of the German Banking Industry Committee (Die Deutsche Kreditwirtschaft - DK) and Deutsche Bundesbank – Scheck Verrechnung Deutschland\n*`URGP`-Payment must be executed as an urgent transaction cleared through a real-time gross settlement system, which is typically identified as a wire or high value transaction.  \n*`URNS`-Payment must be executed as an urgent transaction cleared through a real-time net settlement system, which is typically identified as a wire or high value transaction.  \n*`INST`-Used for payment initiation to identify that a Payment or Direct Debit initiation must be executed as an instant or real-time payment instrument.\n*`SRTP`-Request to Pay (RTP) transaction refers to an RTP scheme (such as for example the SEPA Request to Pay (SRTP) scheme).\n*`SVAT`-Scheck Verarbeitung Austria (Cheque Processing).\n*`G006`-Specifies the service conditions applicable to a tracked exceptions and investigations case.\n*`G007`-Specifies the service level for a tracked inbound customer credit transfer.\n*`G005`-Tracked Instant Customer Credit Transfer.\r\n\r\n\n*`G009`-Specifies the service level for a tracked low-value cross-border customer credit transfer.\n*`WFSM`-Transaction is to be treated as an advice and only applied to the account of the creditor or next agent after settlement of the cover has been confirmed.\n*`EOLO`-Payment is executed following a Euro One-Leg Out Scheme.\n*`SPLI`-A split payment is a payment that is split into several payments of lower value, namely with the purpose to comply with maximum amount thresholds applicable to some domestic Payment Market Infrastructures or to reduce counterparty liquidity risk.\n*`IRCA`-Payment must be executed following the Icelandic Rulebook Council Area (IRCA) scheme."
      enum:
        - BKTR
        - G001
        - G002
        - G003
        - G004
        - NPCA
        - NUGP
        - NURG
        - PRPT
        - SDVA
        - SEPA
        - SVDE
        - URGP
        - URNS
        - INST
        - SRTP
        - SVAT
        - G006
        - G007
        - G005
        - G009
        - WFSM
        - EOLO
        - SPLI
        - IRCA
