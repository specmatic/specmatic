openapi: "3.0.0"
info:
  title: "Widgets API"
  version: "1.0.0"
paths:
  /widgets:
    post:
      summary: "Create Widget"
      parameters:
        - name: Content-Type
          in: header
          required: true
          schema:
            oneOf:
              - type: string
                enum:
                  - application/json
              - type: string
                enum:
                  - application/json; version=2026-12-31
              - type: string
                enum:
                  - application/vnd.widget.json
              - type: string
                enum:
                  - application/vnd.widget.json; version=2026-12-31
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimpleSchema"
          application/json; version=2026-12-31:
            schema:
              $ref: "#/components/schemas/SimpleSchema"
          application/vnd.widget.json:
            schema:
              $ref: "#/components/schemas/SimpleSchema"
          application/vnd.widget.json; version=2026-12-31:
            schema:
              $ref: "#/components/schemas/SimpleSchema"
      responses:
        "201":
          description: "String Content-Type response"
          headers:
            Content-Type:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleSchema"
        "202":
          description: "Enum Content-Type response"
          headers:
            Content-Type:
              schema:
                type: string
                enum:
                  - application/json; version=2026-12-31
          content:
            application/json; version=2026-12-31:
              schema:
                $ref: "#/components/schemas/SimpleSchema"
        "203":
          description: "Pattern Content-Type response"
          headers:
            Content-Type:
              schema:
                type: string
                pattern: "^application/vnd\\.widget\\.json$"
          content:
            application/vnd.widget.json:
              schema:
                $ref: "#/components/schemas/SimpleSchema"
        "204":
          description: "oneOf Content-Type response"
          headers:
            Content-Type:
              schema:
                oneOf:
                  - type: string
                    enum:
                      - application/vnd.widget.json; version=2026-12-31
          content:
            application/vnd.widget.json; version=2026-12-31:
              schema:
                $ref: "#/components/schemas/SimpleSchema"
components:
  schemas:
    SimpleSchema:
      type: object
      required:
        - id
        - message
      properties:
        id:
          type: integer
        message:
          type: string
