openapi: 3.0.0
info:
  title: Sample Product API
  version: 2.0.0
paths:
  /products/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: number
    get:
      summary: Get product by id
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                type: object
                required:
                  - name
                properties:
                  name:
                    type: integer
                  sku:
                    type: string
    post:
      summary: Create product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
      responses:
        "200":
          description: Created product
          content:
            application/json:
              schema:
                type: object
                required:
                  - name
                properties:
                  name:
                    type: string
