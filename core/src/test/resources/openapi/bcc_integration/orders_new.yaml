openapi: 3.0.0
info:
  title: Orders API
  version: 1.0.0
paths:
  /orders:
    get:
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        '400':
          description: bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBrief'
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderInput'
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        # UNCHANGED 5-tuple - request uses OrderInput (untouched), response
        # uses ValidationError (untouched). See orders_old.yaml for rationale.
        '400':
          description: bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /orders/{id}:
    get:
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailed'
  # UNCHANGED operation - identical to old.
  /health:
    get:
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
  /categories:
    get:
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
  # allOf case: Shipment composes a $ref'd constituent (ShipmentBase) and an
  # inline constituent. Both contribute a property that turns breaking below.
  /shipments:
    get:
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shipment'
  # WIP operation - mirrors orders_old.yaml. `code` changes string -> integer
  # (breaking), but the WIP tag keeps it out of the verdict.
  /promotions:
    get:
      tags: [WIP]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                required: [code]
                properties:
                  code:
                    type: integer
  # reffed path-param case: widgetId is $ref'd to a component parameter whose
  # schema changes type string -> integer (breaking). The breadcrumb must
  # resolve to the component parameter's `name` key even though the $ref
  # use-site has no `name`.
  /widgets/{widgetId}:
    put:
      parameters:
        - $ref: '#/components/parameters/WidgetId'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                required: [id]
                properties:
                  id:
                    type: string
components:
  schemas:
    Order:
      type: object
      required: [id, total, customer]
      properties:
        id:
          type: string
        total:
          type: number
        customer:
          $ref: '#/components/schemas/Customer'
        # NEW-SIDE CHANGE N1: Order gains optional `notes` field.
        # Reachable only from RESPONSE bodies (POST uses OrderInput for request).
        # Expected: CHANGED + Compatible on GET /orders 200, POST /orders 201,
        # GET /orders/{id} 200.
        notes:
          type: string
    # OrderInput stays untouched - this is what isolates POST /orders 400 as
    # UNCHANGED even though POST /orders 201 is CHANGED.
    OrderInput:
      type: object
      required: [id, total, customer]
      properties:
        id:
          type: string
        total:
          type: number
        customer:
          $ref: '#/components/schemas/Customer'
    Customer:
      # UNCHANGED on purpose - Customer is referenced by Order but not modified itself.
      # Order-using rows are still CHANGED (because Order changed), but this confirms
      # we don't spuriously flag Customer-only specs.
      type: object
      required: [name, email]
      properties:
        name:
          type: string
        email:
          type: string
    ErrorBrief:
      type: object
      required: [code, message]
      properties:
        # CHANGE 2: ErrorBrief.code type changes from string -> integer.
        # Reachable from: GET /orders 400 only (ErrorDetailed is a separate schema).
        # Expected: CHANGED + Incompatible on GET /orders 400.
        # Expected: GET /orders/{id} 404 (uses ErrorDetailed) stays UNCHANGED -
        #   this proves changeStatus is keyed per 5-tuple, not per (path, method).
        code:
          type: integer
        message:
          type: string
    # UNCHANGED component - identical to old.
    ValidationError:
      type: object
      required: [field, reason]
      properties:
        field:
          type: string
        reason:
          type: string
    ErrorDetailed:
      # Mirrors OLD-SIDE CHANGE O1: the `traceId` field that old declared as
      # optional is gone here. See orders_old.yaml for the change rationale.
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
    Category:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        # CHANGE 3: Category gains optional `description` field on a self-recursive schema.
        # Reachable from: GET /categories 200 (Category[] with children: [Category]).
        # Expected: CHANGED + Compatible on GET /categories 200.
        # Verifies the fingerprint detects changes through a self-recursive $ref cycle.
        description:
          type: string
        children:
          type: array
          items:
            $ref: '#/components/schemas/Category'
    # allOf source-location case: `weight` comes from the $ref'd constituent
    # (ShipmentBase) and `carrier` from the inline constituent. Both change
    # type string -> number (breaking). Each RESPONSE.BODY breadcrumb must be
    # annotated at the constituent that declares the property, not at Shipment.
    ShipmentBase:
      type: object
      required: [weight]
      properties:
        weight:
          type: number
    Shipment:
      allOf:
        - $ref: '#/components/schemas/ShipmentBase'
        - type: object
          required: [carrier]
          properties:
            carrier:
              type: number
  parameters:
    WidgetId:
      name: widgetId
      in: path
      required: true
      schema:
        type: integer
