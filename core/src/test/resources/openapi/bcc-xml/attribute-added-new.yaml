openapi: 3.0.0
info:
  title: XML API
  version: 1
paths:
  /data:
    post:
      summary: post xml
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              xml:
                name: customer
              required:
                - name
                - id
              properties:
                id:
                  type: string
                  xml:
                    attribute: true
                name:
                  type: string
      responses:
        '200':
          description: ok
