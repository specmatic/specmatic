openapi: 3.0.0
info:
  title: XML API
  version: 1
paths:
  /data:
    post:
      summary: post xml
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              xml:
                name: customer
                namespace: http://example.com/customer
                prefix: ns1
              required:
                - name
              properties:
                name:
                  type: string
      responses:
        '200':
          description: ok
