openapi: 3.0.0
info:
  title: XML API
  version: 1
paths:
  /data:
    post:
      summary: post xml
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              xml:
                name: customers
              properties:
                items:
                  type: array
                  xml:
                    wrapped: true
                    name: items
                  items:
                    type: object
                    xml:
                      name: customer
                    required:
                      - name
                    properties:
                      name:
                        type: string
      responses:
        '200':
          description: ok
