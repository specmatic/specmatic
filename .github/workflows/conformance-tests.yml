name: Conformance Tests

on:
  pull_request:
    branches: [ "main" ]

jobs:
  conformance-tests:
    if: startsWith(github.head_ref, 'sahilm/conformance-tests')
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run conformance tests
        run: ./gradlew :conformance-tests:test -PenableConformanceTests=true

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: conformance-tests/build/test-results/test/*.xml
