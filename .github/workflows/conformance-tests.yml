name: Conformance Tests

on:
  push:
    branches: [ "main", "disable-expected-failures-conformance" ]

jobs:
  conformance-tests:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write # This is required so that the dependency check can push dependency graph to the github repository
      checks: write # Required for test reporting
    steps:
      - name: Configure Docker Daemon Networking
        uses: docker/setup-docker-action@v5
        with:
          # the default address pools only allow upto 32 bridge networks. We create smaller ranges so
          # that we can create many thousands of networks without worrying about running out of space.
          # The conformance tests run and create networks in parallel and sometimes the cleanup of the network
          # takes longer than expected.
          # See also: https://straz.to/2021-09-08-docker-address-pools/
          daemon-config: |
            {
              "default-address-pools": [
                {
                  "base": "172.17.0.0/12",
                  "size": 25
                }
              ]
            }
      - uses: specmatic/specmatic-github-workflows/action-build-gradle@main
        with:
          gradle-extra-args: "-p conformance-tests test -PenableConformanceTests=true -x vulnScanSBOMScan -x vulnScanJarScan --info" 
          github-token-for-pr-comment: ${{ secrets.GITHUB_TOKEN }} # use the CI token with write permissions to post PR comments

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: 'conformance-tests/build/test-results/test/*.xml'
          detailed_summary: true
          include_passed: true
          require_tests: false
          check_name: "conformance-tests-results"
          annotate_only: true
          skip_annotations: true

      - name: Upload HTML Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-test-report
          path: conformance-tests/build/reports/tests/test/
          retention-days: 7

      - name: Count Expected Failures
        if: always()
        run: |
          echo "### Conformance Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count expected failures from test logs
          EXPECTED_COUNT=$(grep -r "<<<EXPECTED_FAILURE>>>" conformance-tests/build/test-results/test/*.xml 2>/dev/null | wc -l || echo "0")

          # Get total tests from JUnit XML
          TOTAL_TESTS=$(grep -h 'tests="' conformance-tests/build/test-results/test/*.xml 2>/dev/null | sed 's/.*tests="\([0-9]*\)".*/\1/' | awk '{s+=$1} END {print s}')

          echo "📊 **Test Statistics**" >> $GITHUB_STEP_SUMMARY
          echo "- Total Tests: $TOTAL_TESTS" >> $GITHUB_STEP_SUMMARY
          echo "- Expected Failures: $EXPECTED_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
