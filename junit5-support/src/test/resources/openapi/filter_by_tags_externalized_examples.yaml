openapi: 3.0.0
info:
  title: Filter By Tags Externalized Examples
  version: 1.0.0
paths:
  /orders:
    get:
      tags:
        - WIP
      parameters:
        - in: query
          name: orderId
          schema:
            type: integer
          examples:
            INLINE_GET_ORDERS:
              value: 5
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                properties:
                  id:
                    type: integer
              examples:
                INLINE_GET_ORDERS:
                  value:
                    id: 5
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
  /products:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                properties:
                  id:
                    type: integer
