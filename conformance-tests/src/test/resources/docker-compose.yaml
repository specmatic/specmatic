services:
  mock:
    environment:
      - SPECMATIC_TELEMETRY_EXTRA_LABELS=${SPECMATIC_TELEMETRY_EXTRA_LABELS:?error}
    image: specmatic/specmatic:${SPECMATIC_VERSION:?error}
    command: mock /service.yaml --port 9000
    stop_signal: SIGKILL
    expose:
      - "9000"
    volumes:
      - ${PATH_TO_OPEN_API_SPEC_FILE:?error}:/service.yaml:ro
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://mock:9000/actuator/health" ]
      interval: 2s
      timeout: 5s
      retries: 10

  mitm:
    image: mitmproxy/mitmproxy:${MITM_PROXY_VERSION:?error}
    stop_signal: SIGKILL
    depends_on:
      mock:
        condition: service_healthy
    command: >
      mitmdump
      --quiet
      --mode reverse:http://mock:9000
      --listen-port 9001
      -s /addons/dump_http_traffic_to_stdout.py
    expose:
      - "9001"
    volumes:
      - ./dump_http_traffic_to_stdout.py:/addons/dump_http_traffic_to_stdout.py:ro

  test:
    environment:
      - SPECMATIC_TELEMETRY_EXTRA_LABELS=${SPECMATIC_TELEMETRY_EXTRA_LABELS:?error}
    image: specmatic/specmatic:${SPECMATIC_VERSION:?error}
    depends_on:
      mitm:
        condition: service_started
    command: test /service.yaml --testBaseURL=http://mitm:9001
    volumes:
      - ${PATH_TO_OPEN_API_SPEC_FILE:?error}:/service.yaml:ro
