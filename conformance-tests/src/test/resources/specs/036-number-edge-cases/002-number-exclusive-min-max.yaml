openapi: 3.0.3
info:
  title: "Number with tight minimum and maximum range"
  version: "1.0"
paths:
  /scores:
    get:
      operationId: listScores
      responses:
        '200':
          description: Score list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - player
                    - score
                  properties:
                    player:
                      type: string
                    score:
                      type: number
                      minimum: 0.0
                      maximum: 1.0
    post:
      operationId: createScore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - player
                - score
              properties:
                player:
                  type: string
                score:
                  type: number
                  minimum: 0.0
                  maximum: 1.0
      responses:
        '201':
          description: Created
