openapi: 3.0.3
info:
  title: "Enum - string values"
  version: "1.0"
paths:
  /tickets:
    post:
      operationId: createTicket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - priority
              properties:
                title:
                  type: string
                priority:
                  $ref: '#/components/schemas/Priority'
      responses:
        '201':
          description: Ticket created
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - priority
                properties:
                  id:
                    type: integer
                  priority:
                    $ref: '#/components/schemas/Priority'
components:
  schemas:
    Priority:
      type: string
      enum:
        - low
        - medium
        - high
        - critical
