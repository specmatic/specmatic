openapi: 3.0.3
info:
  title: "Enum - inline (not in components)"
  version: "1.0"
paths:
  /notifications:
    get:
      operationId: listNotifications
      parameters:
        - name: channel
          in: query
          required: true
          schema:
            type: string
            enum:
              - email
              - sms
              - push
      responses:
        '200':
          description: Notification list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - channel
                    - message
                  properties:
                    id:
                      type: integer
                    channel:
                      type: string
                      enum:
                        - email
                        - sms
                        - push
                    message:
                      type: string
