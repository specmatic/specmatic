openapi: 3.0.3
x-specmatic-spec-ref: 'JSON Schema — `default` keyword on a boolean property: https://json-schema.org/draft/2020-12/json-schema-validation#name-default'
info:
  title: "Default value - boolean property"
  version: "1.0"
paths:
  /features:
    get:
      operationId: listFeatures
      responses:
        '200':
          description: Feature list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                    enabled:
                      type: boolean
                      default: false
    post:
      operationId: createFeature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                enabled:
                  type: boolean
                  default: false
      responses:
        '201':
          description: Created
