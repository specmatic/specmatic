openapi: 3.0.3
info:
  title: "Default value - integer property"
  version: "1.0"
paths:
  /products:
    get:
      operationId: listProducts
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                    quantity:
                      type: integer
                      default: 0
    post:
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                quantity:
                  type: integer
                  default: 0
      responses:
        '201':
          description: Created
