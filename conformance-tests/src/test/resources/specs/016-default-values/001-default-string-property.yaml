openapi: 3.0.3
x-specmatic-spec-ref: 'JSON Schema — `default` keyword on a string property: https://json-schema.org/draft/2020-12/json-schema-validation#name-default'
info:
  title: "Default value - string property"
  version: "1.0"
paths:
  /tickets:
    get:
      operationId: listTickets
      responses:
        '200':
          description: Ticket list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - title
                  properties:
                    title:
                      type: string
                    status:
                      type: string
                      default: open
    post:
      operationId: createTicket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
              properties:
                title:
                  type: string
                status:
                  type: string
                  default: open
      responses:
        '201':
          description: Created
