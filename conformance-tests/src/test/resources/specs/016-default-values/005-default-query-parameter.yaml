openapi: 3.0.3
x-specmatic-spec-ref: 'OAS 3.0.3 Parameter Object — `default` on a query parameter schema: https://spec.openapis.org/oas/v3.0.3.html#parameter-object'
info:
  title: "Default value - query parameter"
  version: "1.0"
paths:
  /items:
    get:
      operationId: listItems
      parameters:
        - name: sort
          in: query
          required: false
          schema:
            type: string
            default: createdAt
        - name: order
          in: query
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        '200':
          description: Sorted items
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - name
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
