openapi: 3.0.3
x-specmatic-spec-ref: 'JSON Schema validation — combined string constraints (`minLength`, `maxLength`, `pattern`): https://json-schema.org/draft/2020-12/json-schema-validation#name-validation-keywords-for-strings'
info:
  title: "Constraint - combined string constraints (minLength + maxLength + pattern)"
  version: "1.0"
paths:
  /product-codes:
    get:
      operationId: listProductCodes
      responses:
        '200':
          description: Product code list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - name
                    - code
                  properties:
                    name:
                      type: string
                    code:
                      type: string
                      minLength: 6
                      maxLength: 10
                      pattern: "^[A-Z]{2}-[0-9]+$"
    post:
      operationId: createProductCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - code
              properties:
                name:
                  type: string
                code:
                  type: string
                  minLength: 6
                  maxLength: 10
                  pattern: "^[A-Z]{2}-[0-9]+$"
      responses:
        '201':
          description: Created
