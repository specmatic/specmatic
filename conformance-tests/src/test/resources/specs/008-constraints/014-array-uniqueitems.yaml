openapi: 3.0.3
x-specmatic-spec-ref: 'JSON Schema validation — `uniqueItems`: https://json-schema.org/draft/2020-12/json-schema-validation#name-uniqueitems'
info:
  title: "Constraint - array uniqueItems"
  version: "1.0"
paths:
  /tag-sets:
    get:
      operationId: listTagSets
      responses:
        '200':
          description: Tag set list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - name
                    - tags
                  properties:
                    name:
                      type: string
                    tags:
                      type: array
                      uniqueItems: true
                      items:
                        type: string
    post:
      operationId: createTagSet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - tags
              properties:
                name:
                  type: string
                tags:
                  type: array
                  uniqueItems: true
                  items:
                    type: string
      responses:
        '201':
          description: Created
