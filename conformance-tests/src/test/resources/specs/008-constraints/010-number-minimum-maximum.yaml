openapi: 3.0.3
info:
  title: "Constraint - number minimum and maximum"
  version: "1.0"
paths:
  /measurements:
    get:
      operationId: listMeasurements
      responses:
        '200':
          description: Measurement list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - label
                    - value
                  properties:
                    label:
                      type: string
                    value:
                      type: number
                      minimum: 0.0
                      maximum: 999.99
    post:
      operationId: createMeasurement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - label
                - value
              properties:
                label:
                  type: string
                value:
                  type: number
                  minimum: 0.0
                  maximum: 999.99
      responses:
        '201':
          description: Created
