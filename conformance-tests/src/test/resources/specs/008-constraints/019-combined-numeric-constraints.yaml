openapi: 3.0.3
x-specmatic-expect-failure-request-bodies: "invalid request/response body because integer-multipleof constraint not respected"
x-specmatic-expect-failure-response-bodies: "invalid request/response body because integer-multipleof constraint not respected"
info:
  title: "Constraint - combined numeric constraints (minimum + maximum + multipleOf)"
  version: "1.0"
paths:
  /discounts:
    get:
      operationId: listDiscounts
      responses:
        '200':
          description: Discount list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - label
                    - percent
                  properties:
                    label:
                      type: string
                    percent:
                      type: integer
                      minimum: 5
                      maximum: 50
                      multipleOf: 5
    post:
      operationId: createDiscount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - label
                - percent
              properties:
                label:
                  type: string
                percent:
                  type: integer
                  minimum: 5
                  maximum: 50
                  multipleOf: 5
      responses:
        '201':
          description: Created
