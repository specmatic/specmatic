openapi: 3.0.3
x-specmatic-expect-failure-request-bodies: "invalid request/response body because integer-multipleof constraint not respected"
x-specmatic-expect-failure-response-bodies: "invalid request/response body because integer-multipleof constraint not respected"
x-specmatic-spec-ref: "Schema \"multipleOf\" numeric constraint. See OAS 3.0.3 § Schema Object: https://spec.openapis.org/oas/v3.0.3.html#schema-object"
info:
  title: "Constraint - combined numeric constraints (minimum + maximum + multipleOf)"
  version: "1.0"
paths:
  /discounts:
    get:
      operationId: listDiscounts
      responses:
        '200':
          description: Discount list
          content:
            application/json:
              schema:
                type: array
                minItems: 100
                maxItems: 100
                items:
                  type: object
                  required:
                    - label
                    - percent
                  properties:
                    label:
                      type: string
                    percent:
                      type: integer
                      minimum: 5
                      maximum: 50
                      multipleOf: 5
    post:
      operationId: createDiscount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              minItems: 100
              maxItems: 100
              items:
                type: object
                required:
                  - label
                  - percent
                properties:
                  label:
                    type: string
                  percent:
                    type: integer
                    minimum: 5
                    maximum: 50
                    multipleOf: 5

      responses:
        '201':
          description: Created
