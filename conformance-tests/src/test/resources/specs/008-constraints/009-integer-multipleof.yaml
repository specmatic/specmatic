openapi: 3.0.3
x-specmatic-expect-failure-request-bodies: true
x-specmatic-expect-failure-response-bodies: true
info:
  title: "Constraint - integer multipleOf"
  version: "1.0"
paths:
  /quantities:
    get:
      operationId: listQuantities
      responses:
        '200':
          description: Quantity list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - product
                    - quantity
                  properties:
                    product:
                      type: string
                    quantity:
                      type: integer
                      multipleOf: 6
    post:
      operationId: createQuantity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - product
                - quantity
              properties:
                product:
                  type: string
                quantity:
                  type: integer
                  multipleOf: 6
      responses:
        '201':
          description: Created
