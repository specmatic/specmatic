openapi: 3.0.3
x-specmatic-spec-ref: 'JSON Schema validation — `multipleOf` with decimal divisor: https://json-schema.org/draft/2020-12/json-schema-validation#name-multipleof'
info:
  title: "Number multipleOf with decimal value"
  version: "1.0"
paths:
  /amounts:
    get:
      operationId: listAmounts
      responses:
        '200':
          description: Amount list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - label
                    - amount
                  properties:
                    label:
                      type: string
                    amount:
                      type: number
                      multipleOf: 0.25
    post:
      operationId: createAmount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - label
                - amount
              properties:
                label:
                  type: string
                amount:
                  type: number
                  multipleOf: 0.25
      responses:
        '201':
          description: Created
