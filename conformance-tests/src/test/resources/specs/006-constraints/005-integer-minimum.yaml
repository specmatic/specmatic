openapi: 3.0.3
info:
  title: Constraint - integer minimum
  version: '1.0'
paths:
  /scores:
    get:
      operationId: listScores
      responses:
        '200':
          description: Score list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - player
                  - score
                  properties:
                    player:
                      type: string
                    score:
                      type: integer
                      minimum: 0
              examples:
                example1:
                  value:
                  - player: value1
                    score: 0
                example2:
                  value:
                  - player: value2
                    score: 50
    post:
      operationId: createScore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - player
              - score
              properties:
                player:
                  type: string
                score:
                  type: integer
                  minimum: 0
            examples:
              example1:
                value:
                  player: value1
                  score: 0
              example2:
                value:
                  player: value2
                  score: 50
      responses:
        '201':
          description: Created
