openapi: 3.0.3
info:
  title: Constraint - integer minimum and maximum
  version: '1.0'
paths:
  /percentages:
    get:
      operationId: listPercentages
      responses:
        '200':
          description: Percentage list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - label
                  - value
                  properties:
                    label:
                      type: string
                    value:
                      type: integer
                      minimum: 0
                      maximum: 100
              examples:
                example1:
                  value:
                  - label: value1
                    value: 0
                example2:
                  value:
                  - label: value2
                    value: 50
    post:
      operationId: createPercentage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - label
              - value
              properties:
                label:
                  type: string
                value:
                  type: integer
                  minimum: 0
                  maximum: 100
            examples:
              example1:
                value:
                  label: value1
                  value: 0
              example2:
                value:
                  label: value2
                  value: 50
      responses:
        '201':
          description: Created
