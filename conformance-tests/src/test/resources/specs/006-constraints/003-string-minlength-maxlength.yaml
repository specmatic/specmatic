openapi: 3.0.3
info:
  title: Constraint - string minLength and maxLength
  version: '1.0'
paths:
  /slugs:
    get:
      operationId: listSlugs
      responses:
        '200':
          description: Slug list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - id
                  - slug
                  properties:
                    id:
                      type: integer
                    slug:
                      type: string
                      minLength: 2
                      maxLength: 30
              examples:
                example1:
                  value:
                  - id: 0
                    slug: value1
                example2:
                  value:
                  - id: 50
                    slug: value2
    post:
      operationId: createSlug
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - id
              - slug
              properties:
                id:
                  type: integer
                slug:
                  type: string
                  minLength: 2
                  maxLength: 30
            examples:
              example1:
                value:
                  id: 0
                  slug: value1
              example2:
                value:
                  id: 50
                  slug: value2
      responses:
        '201':
          description: Created
