openapi: 3.0.3
info:
  title: Constraint - object minProperties
  version: '1.0'
paths:
  /profiles:
    get:
      operationId: listProfiles
      responses:
        '200':
          description: Profile list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - id
                  - attributes
                  properties:
                    id:
                      type: integer
                    attributes:
                      type: object
                      minProperties: 1
                      additionalProperties:
                        type: string
              examples:
                example1:
                  value:
                  - id: 0
                    attributes:
                      keya: value1
                example2:
                  value:
                  - id: 50
                    attributes:
                      keyb: value2
    post:
      operationId: createProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - id
              - attributes
              properties:
                id:
                  type: integer
                attributes:
                  type: object
                  minProperties: 1
                  additionalProperties:
                    type: string
            examples:
              example1:
                value:
                  id: 0
                  attributes:
                    keya: value1
              example2:
                value:
                  id: 50
                  attributes:
                    keyb: value2
      responses:
        '201':
          description: Created
