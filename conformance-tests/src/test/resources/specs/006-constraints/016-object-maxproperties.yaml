openapi: 3.0.3
info:
  title: Constraint - object maxProperties
  version: '1.0'
paths:
  /configs:
    get:
      operationId: listConfigs
      responses:
        '200':
          description: Config list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - name
                  - settings
                  properties:
                    name:
                      type: string
                    settings:
                      type: object
                      maxProperties: 5
                      additionalProperties:
                        type: string
              examples:
                example1:
                  value:
                  - name: value1
                    settings:
                      keya: value1
                example2:
                  value:
                  - name: value2
                    settings:
                      keyb: value2
    post:
      operationId: createConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - settings
              properties:
                name:
                  type: string
                settings:
                  type: object
                  maxProperties: 5
                  additionalProperties:
                    type: string
            examples:
              example1:
                value:
                  name: value1
                  settings:
                    keya: value1
              example2:
                value:
                  name: value2
                  settings:
                    keyb: value2
      responses:
        '201':
          description: Created
