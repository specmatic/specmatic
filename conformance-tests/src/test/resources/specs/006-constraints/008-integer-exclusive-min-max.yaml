openapi: 3.0.3
info:
  title: Constraint - integer exclusiveMinimum and exclusiveMaximum
  version: '1.0'
paths:
  /temperatures:
    get:
      operationId: listTemperatures
      responses:
        '200':
          description: Temperature list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - sensor
                  - celsius
                  properties:
                    sensor:
                      type: string
                    celsius:
                      type: integer
                      exclusiveMinimum: -273
                      exclusiveMaximum: 1000
              examples:
                example1:
                  value:
                  - sensor: value1
                    celsius: -272
                example2:
                  value:
                  - sensor: value2
                    celsius: 363
    post:
      operationId: createTemperature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - sensor
              - celsius
              properties:
                sensor:
                  type: string
                celsius:
                  type: integer
                  exclusiveMinimum: -273
                  exclusiveMaximum: 1000
            examples:
              example1:
                value:
                  sensor: value1
                  celsius: -272
              example2:
                value:
                  sensor: value2
                  celsius: 363
      responses:
        '201':
          description: Created
