openapi: 3.0.3
info:
  title: Constraint - readOnly and writeOnly
  version: '1.0'
paths:
  /accounts:
    get:
      operationId: listAccounts
      responses:
        '200':
          description: Account list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - id
                  - email
                  properties:
                    id:
                      type: integer
                      readOnly: true
                    email:
                      type: string
                    password:
                      type: string
                      writeOnly: true
              examples:
                example1:
                  value:
                  - id: 1
                    email: value1
                example2:
                  value:
                  - id: 50
                    email: value2
    post:
      operationId: createAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - email
              - password
              properties:
                id:
                  type: integer
                  readOnly: true
                email:
                  type: string
                password:
                  type: string
                  writeOnly: true
            examples:
              example1:
                value:
                  email: value1
                  password: s3cret1
              example2:
                value:
                  email: value2
                  password: s3cret2
      responses:
        '201':
          description: Created
