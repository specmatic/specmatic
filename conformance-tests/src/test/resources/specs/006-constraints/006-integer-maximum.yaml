openapi: 3.0.3
info:
  title: Constraint - integer maximum
  version: '1.0'
paths:
  /ratings:
    get:
      operationId: listRatings
      responses:
        '200':
          description: Rating list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - item
                  - rating
                  properties:
                    item:
                      type: string
                    rating:
                      type: integer
                      maximum: 5
              examples:
                example1:
                  value:
                  - item: value1
                    rating: 0
                example2:
                  value:
                  - item: value2
                    rating: 2
    post:
      operationId: createRating
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - item
              - rating
              properties:
                item:
                  type: string
                rating:
                  type: integer
                  maximum: 5
            examples:
              example1:
                value:
                  item: value1
                  rating: 0
              example2:
                value:
                  item: value2
                  rating: 2
      responses:
        '201':
          description: Created
