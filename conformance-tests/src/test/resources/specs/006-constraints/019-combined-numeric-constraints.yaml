openapi: 3.0.3
info:
  title: Constraint - combined numeric constraints (minimum + maximum + multipleOf)
  version: '1.0'
paths:
  /discounts:
    get:
      operationId: listDiscounts
      responses:
        '200':
          description: Discount list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - label
                  - percent
                  properties:
                    label:
                      type: string
                    percent:
                      type: integer
                      minimum: 5
                      maximum: 50
                      multipleOf: 5
              examples:
                example1:
                  value:
                  - label: value1
                    percent: 5
                example2:
                  value:
                  - label: value2
                    percent: 10
    post:
      operationId: createDiscount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - label
              - percent
              properties:
                label:
                  type: string
                percent:
                  type: integer
                  minimum: 5
                  maximum: 50
                  multipleOf: 5
            examples:
              example1:
                value:
                  label: value1
                  percent: 5
              example2:
                value:
                  label: value2
                  percent: 10
      responses:
        '201':
          description: Created
