openapi: 3.0.0

info:
  title: Hello world
  version: "1.0"
paths:
  /hello/{id}:
    get:
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      security:
        - BearerAuth: [ ]
      responses:
        '200':
          description: OK
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: Bearer
