openapi: 3.0.3
info:
  title: "Format - ipv4 (JSON Schema)"
  version: "1.0"
paths:
  /allowlist:
    get:
      operationId: getAllowlist
      responses:
        '200':
          description: Allowed IPs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - label
                    - ip
                  properties:
                    label:
                      type: string
                    ip:
                      type: string
                      format: ipv4
