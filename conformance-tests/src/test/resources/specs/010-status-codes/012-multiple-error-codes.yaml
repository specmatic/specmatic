openapi: 3.0.3
info:
  title: "Multiple error status codes on one endpoint"
  version: "1.0"
paths:
  /accounts/{accountId}:
    put:
      operationId: updateAccount
      summary: Update account with multiple possible errors
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: integer
          examples:
            NOT_FOUND:
              value: 9999
            BAD_REQUEST:
              value: 1
            CONFLICT:
              value: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
            examples:
              NOT_FOUND:
                value:
                  name: "Valid Name"
              BAD_REQUEST:
                value:
                  invalid: "field"
              CONFLICT:
                value:
                  name: "Existing Name"
      responses:
        '200':
          description: Account updated
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - name
                properties:
                  id:
                    type: integer
                  name:
                    type: string
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
              examples:
                BAD_REQUEST:
                  value:
                    error: "Invalid request body"
        '404':
          description: Account not found
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
              examples:
                NOT_FOUND:
                  value:
                    error: "Account not found"
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
              examples:
                CONFLICT:
                  value:
                    error: "Account name already taken"
