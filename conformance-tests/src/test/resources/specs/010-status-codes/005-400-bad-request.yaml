openapi: 3.0.3
x-specmatic-spec-ref: 'HTTP status 400 Bad Request (RFC 9110 §15.5.1): https://www.rfc-editor.org/rfc/rfc9110#name-400-bad-request'
info:
  title: "Status code - 400 Bad Request"
  version: "1.0"
paths:
  /items:
    post:
      operationId: createItem
      summary: Create item with possible 400 response
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
            examples:
              ERROR:
                value:
                  something: else
      responses:
        '201':
          description: Item created
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                properties:
                  id:
                    type: integer
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
              examples:
                ERROR:
                  value:
                    error: "Invalid request body"
