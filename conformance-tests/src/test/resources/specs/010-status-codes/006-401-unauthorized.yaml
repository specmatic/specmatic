openapi: 3.0.3
x-specmatic-spec-ref: 'HTTP status 401 Unauthorized (RFC 9110 §15.5.2): https://www.rfc-editor.org/rfc/rfc9110#name-401-unauthorized'
info:
  title: "Status code - 401 Unauthorized"
  version: "1.0"
paths:
  /secrets:
    get:
      operationId: listSecrets
      summary: List secrets with possible 401
      parameters:
        - name: X-Api-Key
          in: header
          required: true
          schema:
            type: string
          examples:
            ERROR:
              value: "invalid-key"
      responses:
        '200':
          description: Secrets list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - value
                  properties:
                    id:
                      type: integer
                    value:
                      type: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
              examples:
                ERROR:
                  value:
                    error: "Invalid API key"
