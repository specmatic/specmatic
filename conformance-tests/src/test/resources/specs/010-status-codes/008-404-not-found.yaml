openapi: 3.0.3
x-specmatic-spec-ref: 'HTTP status 404 Not Found (RFC 9110 §15.5.5): https://www.rfc-editor.org/rfc/rfc9110#name-404-not-found'
info:
  title: "Status code - 404 Not Found"
  version: "1.0"
paths:
  /items/{itemId}:
    get:
      operationId: getItem
      summary: Get item with possible 404
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
          examples:
            ERROR:
              value: 0
      responses:
        '200':
          description: Item found
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - name
                properties:
                  id:
                    type: integer
                  name:
                    type: string
        '404':
          description: Item not found
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
              examples:
                ERROR:
                  value:
                    error: "Item not found"
