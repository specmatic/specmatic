openapi: 3.0.3
info:
  title: "Status code - 200 OK"
  version: "1.0"
paths:
  /items:
    get:
      operationId: listItems
      summary: List items returning 200
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - name
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
