openapi: 3.0.3
info:
  title: "Cookie parameter - combined with header and query"
  version: "1.0"
paths:
  /items:
    get:
      operationId: listItems
      parameters:
        - name: session_id
          in: cookie
          required: true
          schema:
            type: string
        - name: X-Request-Id
          in: header
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Items list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - name
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
