openapi: 3.0.3
info:
  title: "Discriminator with allOf inheritance"
  version: "1.0"
paths:
  /shapes:
    get:
      operationId: listShapes
      responses:
        '200':
          description: Shape list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Shape'
    post:
      operationId: createShape
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Shape'
      responses:
        '201':
          description: Created
components:
  schemas:
    Shape:
      oneOf:
        - $ref: '#/components/schemas/Circle'
        - $ref: '#/components/schemas/Rectangle'
      discriminator:
        propertyName: shapeType
    ShapeBase:
      type: object
      required:
        - shapeType
        - color
      properties:
        shapeType:
          type: string
        color:
          type: string
    Circle:
      allOf:
        - $ref: '#/components/schemas/ShapeBase'
        - type: object
          required:
            - radius
          properties:
            radius:
              type: number
    Rectangle:
      allOf:
        - $ref: '#/components/schemas/ShapeBase'
        - type: object
          required:
            - width
            - height
          properties:
            width:
              type: number
            height:
              type: number
