openapi: 3.0.3
x-specmatic-spec-ref: 'JSON Schema "uri-template" format (RFC 6570): https://json-schema.org/draft/2020-12/json-schema-validation#name-uri-template'
info:
  title: "Format - uri-template (JSON Schema)"
  version: "1.0"
paths:
  /templates:
    get:
      operationId: listTemplates
      responses:
        '200':
          description: URI templates
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - name
                    - template
                  properties:
                    name:
                      type: string
                    template:
                      type: string
                      format: uri-template
    post:
      operationId: createTemplates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - template
              properties:
                name:
                  type: string
                template:
                  type: string
                  format: uri-template
      responses:
        '201':
          description: Created
