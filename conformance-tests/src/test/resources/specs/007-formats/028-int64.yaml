openapi: 3.0.3
x-specmatic-spec-ref: 'OAS 3.0.3 integer format — `int64` (signed 64-bit): https://spec.openapis.org/oas/v3.0.3.html#data-types'
info:
  title: "Format - int64 (OpenAPI)"
  version: "1.0"
paths:
  /statistics:
    get:
      operationId: getStatistics
      responses:
        '200':
          description: Statistics
          content:
            application/json:
              schema:
                type: object
                required:
                  - totalBytes
                  - totalRecords
                properties:
                  totalBytes:
                    type: integer
                    format: int64
                  totalRecords:
                    type: integer
                    format: int64
    post:
      operationId: createStatistics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - totalBytes
                - totalRecords
              properties:
                totalBytes:
                  type: integer
                  format: int64
                totalRecords:
                  type: integer
                  format: int64
      responses:
        '201':
          description: Created
