openapi: 3.0.3
x-specmatic-spec-ref: 'OAS 3.x integer format extension — `uint64` (64-bit unsigned): https://spec.openapis.org/oas/v3.0.3.html#data-types'
info:
  title: "Format - uint64 (OpenAPI)"
  version: "1.0"
paths:
  /storage:
    get:
      operationId: getStorage
      responses:
        '200':
          description: Storage info
          content:
            application/json:
              schema:
                type: object
                required:
                  - totalBytes
                  - usedBytes
                properties:
                  totalBytes:
                    type: integer
                    format: uint64
                  usedBytes:
                    type: integer
                    format: uint64
    post:
      operationId: createStorage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - totalBytes
                - usedBytes
              properties:
                totalBytes:
                  type: integer
                  format: uint64
                usedBytes:
                  type: integer
                  format: uint64
      responses:
        '201':
          description: Created
