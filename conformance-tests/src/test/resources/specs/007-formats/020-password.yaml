openapi: 3.0.3
x-specmatic-spec-ref: 'OAS 3.0.3 "password" format hint (no validation, UI hint only): https://spec.openapis.org/oas/v3.0.3.html#data-types'
info:
  title: "Format - password (OpenAPI)"
  version: "1.0"
paths:
  /login:
    post:
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                required:
                  - token
                properties:
                  token:
                    type: string
