openapi: 3.0.3
x-specmatic-spec-ref: 'OAS 3.0.3 number format — `float` (IEEE 754 single): https://spec.openapis.org/oas/v3.0.3.html#data-types'
info:
  title: "Format - float (OpenAPI)"
  version: "1.0"
paths:
  /sensor:
    get:
      operationId: getSensor
      responses:
        '200':
          description: Sensor reading
          content:
            application/json:
              schema:
                type: object
                required:
                  - humidity
                  - pressure
                properties:
                  humidity:
                    type: number
                    format: float
                  pressure:
                    type: number
                    format: float
    post:
      operationId: createSensor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - humidity
                - pressure
              properties:
                humidity:
                  type: number
                  format: float
                pressure:
                  type: number
                  format: float
      responses:
        '201':
          description: Created
