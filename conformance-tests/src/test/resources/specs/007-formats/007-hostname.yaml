openapi: 3.0.3
x-specmatic-spec-ref: 'JSON Schema "hostname" format (RFC 1123): https://json-schema.org/draft/2020-12/json-schema-validation#name-hostnames'
info:
  title: "Format - hostname (JSON Schema)"
  version: "1.0"
paths:
  /servers:
    get:
      operationId: listServers
      responses:
        '200':
          description: Server list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - name
                    - host
                  properties:
                    name:
                      type: string
                    host:
                      type: string
                      format: hostname
    post:
      operationId: createServers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - host
              properties:
                name:
                  type: string
                host:
                  type: string
                  format: hostname
      responses:
        '201':
          description: Created
