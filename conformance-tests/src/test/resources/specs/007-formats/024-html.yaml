openapi: 3.0.3
x-specmatic-spec-ref: 'Non-standard "html" format hint (no validation): https://spec.openapis.org/oas/v3.0.3.html#data-types'
info:
  title: "Format - html (OpenAPI)"
  version: "1.0"
paths:
  /pages:
    get:
      operationId: listPages
      responses:
        '200':
          description: Page list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - title
                    - content
                  properties:
                    title:
                      type: string
                    content:
                      type: string
                      format: html
    post:
      operationId: createPages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - content
              properties:
                title:
                  type: string
                content:
                  type: string
                  format: html
      responses:
        '201':
          description: Created
