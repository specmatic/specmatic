openapi: 3.0.3
x-specmatic-spec-ref: 'Non-standard "media-range" format hint (RFC 9110 §12.5.1): https://spec.openapis.org/oas/v3.0.3.html#data-types'
info:
  title: "Format - media-range (OpenAPI)"
  version: "1.0"
paths:
  /content-types:
    get:
      operationId: listContentTypes
      responses:
        '200':
          description: Supported content types
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - label
                    - mediaType
                  properties:
                    label:
                      type: string
                    mediaType:
                      type: string
                      format: media-range
    post:
      operationId: createContentTypes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - label
                - mediaType
              properties:
                label:
                  type: string
                mediaType:
                  type: string
                  format: media-range
      responses:
        '201':
          description: Created
