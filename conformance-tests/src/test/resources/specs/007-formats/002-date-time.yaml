openapi: 3.0.3
x-specmatic-spec-ref: 'JSON Schema "date-time" format (RFC 3339): https://json-schema.org/draft/2020-12/json-schema-validation#name-dates-times-and-duration'
info:
  title: "Format - date-time (JSON Schema)"
  version: "1.0"
paths:
  /events:
    get:
      operationId: listEvents
      responses:
        '200':
          description: Event list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - title
                    - startedAt
                  properties:
                    title:
                      type: string
                    startedAt:
                      type: string
                      format: date-time
    post:
      operationId: createEvents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - startedAt
              properties:
                title:
                  type: string
                startedAt:
                  type: string
                  format: date-time
      responses:
        '201':
          description: Created
