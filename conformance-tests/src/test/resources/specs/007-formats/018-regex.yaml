openapi: 3.0.3
x-specmatic-spec-ref: 'JSON Schema "regex" format (ECMA 262 regular expressions): https://json-schema.org/draft/2020-12/json-schema-validation#name-regex'
info:
  title: "Format - regex (JSON Schema)"
  version: "1.0"
paths:
  /validation-rules:
    get:
      operationId: listRules
      responses:
        '200':
          description: Rule list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - field
                    - pattern
                  properties:
                    field:
                      type: string
                    pattern:
                      type: string
                      format: regex
    post:
      operationId: createRules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - field
                - pattern
              properties:
                field:
                  type: string
                pattern:
                  type: string
                  format: regex
      responses:
        '201':
          description: Created
