openapi: 3.0.3
x-specmatic-expect-failure-request-bodies: "invalid RFC 6531 Mailbox"
x-specmatic-expect-failure-response-bodies: "invalid RFC 6531 Mailbox"
x-specmatic-spec-ref: 'JSON Schema "idn-email" format (RFC 6531 mailbox): https://json-schema.org/draft/2020-12/json-schema-validation#name-email-addresses'
info:
  title: "Format - idn-email (JSON Schema)"
  version: "1.0"
paths:
  /subscribers:
    get:
      operationId: listSubscribers
      responses:
        '200':
          description: Subscriber list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - name
                    - email
                  properties:
                    name:
                      type: string
                    email:
                      type: string
                      format: idn-email
    post:
      operationId: createSubscribers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: idn-email
      responses:
        '201':
          description: Created
