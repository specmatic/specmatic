openapi: 3.0.3
x-specmatic-expect-failure-request-bodies: "invalid RFC 2673 IP address"
x-specmatic-expect-failure-response-bodies: "invalid RFC 2673 IP address"
x-specmatic-spec-ref: 'JSON Schema "ipv4" format (RFC 2673 §3.2 dotted-quad): https://json-schema.org/draft/2020-12/json-schema-validation#name-ip-addresses'
info:
  title: "Format - ipv4 (JSON Schema)"
  version: "1.0"
paths:
  /allowlist:
    get:
      operationId: getAllowlist
      responses:
        '200':
          description: Allowed IPs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - label
                    - ip
                  properties:
                    label:
                      type: string
                    ip:
                      type: string
                      format: ipv4
    post:
      operationId: createAllowlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - label
                - ip
              properties:
                label:
                  type: string
                ip:
                  type: string
                  format: ipv4
      responses:
        '201':
          description: Created
