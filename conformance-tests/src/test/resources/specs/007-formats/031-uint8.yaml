openapi: 3.0.3
x-specmatic-spec-ref: 'OAS 3.x integer format extension — `uint8` (8-bit unsigned): https://spec.openapis.org/oas/v3.0.3.html#data-types'
info:
  title: "Format - uint8 (OpenAPI)"
  version: "1.0"
paths:
  /pixel:
    get:
      operationId: getPixel
      responses:
        '200':
          description: Pixel value
          content:
            application/json:
              schema:
                type: object
                required:
                  - red
                  - green
                  - blue
                properties:
                  red:
                    type: integer
                    format: uint8
                  green:
                    type: integer
                    format: uint8
                  blue:
                    type: integer
                    format: uint8
    post:
      operationId: createPixel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - red
                - green
                - blue
              properties:
                red:
                  type: integer
                  format: uint8
                green:
                  type: integer
                  format: uint8
                blue:
                  type: integer
                  format: uint8
      responses:
        '201':
          description: Created
