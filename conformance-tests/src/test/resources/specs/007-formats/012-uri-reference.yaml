openapi: 3.0.3
x-specmatic-spec-ref: 'JSON Schema "uri-reference" format (RFC 3986): https://json-schema.org/draft/2020-12/json-schema-validation#name-resource-identifiers'
info:
  title: "Format - uri-reference (JSON Schema)"
  version: "1.0"
paths:
  /links:
    get:
      operationId: listLinks
      responses:
        '200':
          description: Link list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - label
                    - href
                  properties:
                    label:
                      type: string
                    href:
                      type: string
                      format: uri-reference
    post:
      operationId: createLinks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - label
                - href
              properties:
                label:
                  type: string
                href:
                  type: string
                  format: uri-reference
      responses:
        '201':
          description: Created
