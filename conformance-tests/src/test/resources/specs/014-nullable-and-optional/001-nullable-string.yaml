openapi: 3.0.3
info:
  title: "Nullable string property"
  version: "1.0"
paths:
  /contacts:
    get:
      operationId: listContacts
      responses:
        '200':
          description: Contact list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - name
                    - nickname
                  properties:
                    name:
                      type: string
                    nickname:
                      type: string
                      nullable: true
    post:
      operationId: createContact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - nickname
              properties:
                name:
                  type: string
                nickname:
                  type: string
                  nullable: true
      responses:
        '201':
          description: Created
