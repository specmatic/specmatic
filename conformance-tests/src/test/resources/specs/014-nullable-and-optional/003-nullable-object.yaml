openapi: 3.0.3
x-specmatic-spec-ref: 'OAS 3.0.3 Schema Object — `nullable: true` on an object: https://spec.openapis.org/oas/v3.0.3.html#schema-object'
info:
  title: "Nullable object property"
  version: "1.0"
paths:
  /profiles:
    get:
      operationId: listProfiles
      responses:
        '200':
          description: Profile list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - name
                    - address
                  properties:
                    name:
                      type: string
                    address:
                      nullable: true
                      type: object
                      required:
                        - city
                      properties:
                        city:
                          type: string
                        zipCode:
                          type: string
    post:
      operationId: createProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - address
              properties:
                name:
                  type: string
                address:
                  nullable: true
                  type: object
                  required:
                    - city
                  properties:
                    city:
                      type: string
                    zipCode:
                      type: string
      responses:
        '201':
          description: Created
