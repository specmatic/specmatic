openapi: 3.0.3
info:
  title: "Optional and nullable combined"
  version: "1.0"
paths:
  /records:
    get:
      operationId: listRecords
      responses:
        '200':
          description: Record list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                  properties:
                    id:
                      type: integer
                    notes:
                      type: string
                      nullable: true
                    deletedAt:
                      type: string
                      format: date-time
                      nullable: true
    post:
      operationId: createRecord
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
              properties:
                id:
                  type: integer
                notes:
                  type: string
                  nullable: true
                deletedAt:
                  type: string
                  format: date-time
                  nullable: true
      responses:
        '201':
          description: Created
