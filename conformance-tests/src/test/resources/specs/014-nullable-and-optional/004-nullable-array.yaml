openapi: 3.0.3
x-specmatic-spec-ref: 'OAS 3.0.3 Schema Object — `nullable: true` on an array: https://spec.openapis.org/oas/v3.0.3.html#schema-object'
info:
  title: "Nullable array property"
  version: "1.0"
paths:
  /teams:
    get:
      operationId: listTeams
      responses:
        '200':
          description: Team list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - name
                    - members
                  properties:
                    name:
                      type: string
                    members:
                      type: array
                      nullable: true
                      items:
                        type: string
    post:
      operationId: createTeam
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - members
              properties:
                name:
                  type: string
                members:
                  type: array
                  nullable: true
                  items:
                    type: string
      responses:
        '201':
          description: Created
