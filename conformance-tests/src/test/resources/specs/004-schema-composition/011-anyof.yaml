openapi: 3.0.3
info:
  title: Schema composition - anyOf
  version: '1.0'
paths:
  /search-results:
    get:
      operationId: listSearchResults
      responses:
        '200':
          description: Search result list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - title
                  - score
                  properties:
                    title:
                      type: string
                    score:
                      anyOf:
                      - type: integer
                      - type: number
              examples:
                example1:
                  value:
                  - title: value1
                    score: 0
                example2:
                  value:
                  - title: value2
                    score: 50
    post:
      operationId: createSearchResult
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - title
              - score
              properties:
                title:
                  type: string
                score:
                  anyOf:
                  - type: integer
                  - type: number
            examples:
              example1:
                value:
                  title: value1
                  score: 0
              example2:
                value:
                  title: value2
                  score: 50
      responses:
        '201':
          description: Created
