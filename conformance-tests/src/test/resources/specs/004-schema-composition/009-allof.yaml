openapi: 3.0.3
info:
  title: Schema composition - allOf
  version: '1.0'
paths:
  /pets:
    get:
      operationId: listPets
      responses:
        '200':
          description: Pet list
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                  - type: object
                    required:
                    - id
                    - name
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                  - type: object
                    required:
                    - species
                    - age
                    properties:
                      species:
                        type: string
                      age:
                        type: integer
              examples:
                example1:
                  value:
                  - id: 0
                    name: value1
                    species: value1
                    age: 0
                example2:
                  value:
                  - id: 50
                    name: value2
                    species: value2
                    age: 50
    post:
      operationId: createPet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
              - type: object
                required:
                - id
                - name
                properties:
                  id:
                    type: integer
                  name:
                    type: string
              - type: object
                required:
                - species
                - age
                properties:
                  species:
                    type: string
                  age:
                    type: integer
            examples:
              example1:
                value:
                  id: 0
                  name: value1
                  species: value1
                  age: 0
              example2:
                value:
                  id: 50
                  name: value2
                  species: value2
                  age: 50
      responses:
        '201':
          description: Created
