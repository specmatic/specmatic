openapi: 3.0.3
info:
  title: Schema composition - array of integers
  version: '1.0'
paths:
  /scores:
    get:
      operationId: listScores
      responses:
        '200':
          description: Score list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer
              examples:
                example1:
                  value:
                  - 0
                example2:
                  value:
                  - 50
    post:
      operationId: createScores
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: integer
            examples:
              example1:
                value:
                - 0
              example2:
                value:
                - 50
      responses:
        '201':
          description: Created
