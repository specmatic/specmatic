openapi: 3.0.3
info:
  title: Schema composition - nullable
  version: '1.0'
paths:
  /employees:
    get:
      operationId: listEmployees
      responses:
        '200':
          description: Employee list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - id
                  - name
                  - managerId
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    managerId:
                      type: integer
                      nullable: true
              examples:
                example1:
                  value:
                  - id: 0
                    name: value1
                    managerId: 5
                example2:
                  value:
                  - id: 50
                    name: value2
                    managerId: null
    post:
      operationId: createEmployee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - id
              - name
              - managerId
              properties:
                id:
                  type: integer
                name:
                  type: string
                managerId:
                  type: integer
                  nullable: true
            examples:
              example1:
                value:
                  id: 1
                  name: value1
                  managerId: 5
              example2:
                value:
                  id: 50
                  name: value2
                  managerId: null
      responses:
        '201':
          description: Created
