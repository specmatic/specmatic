openapi: 3.0.3
info:
  title: Schema composition - array of arrays (matrix)
  version: '1.0'
paths:
  /matrices:
    get:
      operationId: listMatrices
      responses:
        '200':
          description: Matrix list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - name
                  - rows
                  properties:
                    name:
                      type: string
                    rows:
                      type: array
                      items:
                        type: array
                        items:
                          type: number
              examples:
                example1:
                  value:
                  - name: value1
                    rows:
                    - - 0
                example2:
                  value:
                  - name: value2
                    rows:
                    - - 50
    post:
      operationId: createMatrix
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - rows
              properties:
                name:
                  type: string
                rows:
                  type: array
                  items:
                    type: array
                    items:
                      type: number
            examples:
              example1:
                value:
                  name: value1
                  rows:
                  - - 0
              example2:
                value:
                  name: value2
                  rows:
                  - - 50
      responses:
        '201':
          description: Created
