openapi: 3.0.3
x-specmatic-spec-ref: 'OAS 3.0.3 Operation Object — DELETE method semantics (RFC 9110 §9.3.5): https://spec.openapis.org/oas/v3.0.3.html#operation-object'
info:
  title: "DELETE resource"
  version: "1.0"
paths:
  /items/{id}:
    delete:
      operationId: deleteItem
      summary: Delete an item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Item deleted
