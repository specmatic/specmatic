openapi: 3.0.3
x-specmatic-spec-ref: 'OAS 3.0.3 Operation Object — GET method semantics (RFC 9110 §9.3.1): https://spec.openapis.org/oas/v3.0.3.html#operation-object'
info:
  title: "GET with JSON response"
  version: "1.0"
paths:
  /items:
    get:
      operationId: listItems
      summary: List items
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                required:
                  - name
                properties:
                  name:
                    type: string
