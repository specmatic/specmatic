openapi: 3.0.3
info:
  title: POST with request body
  version: '1.0'
paths:
  /items:
    post:
      operationId: createItem
      summary: Create an item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              properties:
                name:
                  type: string
            examples:
              example1:
                value:
                  name: value1
              example2:
                value:
                  name: value2
      responses:
        '201':
          description: Item created
          content:
            application/json:
              schema:
                type: object
                required:
                - id
                properties:
                  id:
                    type: integer
              examples:
                example1:
                  value:
                    id: 0
                example2:
                  value:
                    id: 50
