openapi: 3.0.3
x-specmatic-spec-ref: 'OAS 3.0.3 Operation Object — PUT method semantics (RFC 9110 §9.3.4): https://spec.openapis.org/oas/v3.0.3.html#operation-object'
info:
  title: "PUT with request body"
  version: "1.0"
paths:
  /items/{id}:
    put:
      operationId: updateItem
      summary: Replace an item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Item updated
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - name
                properties:
                  id:
                    type: integer
                  name:
                    type: string
