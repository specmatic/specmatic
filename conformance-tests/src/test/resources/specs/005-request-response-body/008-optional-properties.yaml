openapi: 3.0.3
info:
  title: "Request/Response body - optional properties"
  version: "1.0"
paths:
  /users:
    get:
      operationId: listUsers
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - name
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    bio:
                      type: string
                    age:
                      type: integer
    post:
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
                - name
              properties:
                id:
                  type: integer
                name:
                  type: string
                bio:
                  type: string
                age:
                  type: integer
      responses:
        '201':
          description: Created
