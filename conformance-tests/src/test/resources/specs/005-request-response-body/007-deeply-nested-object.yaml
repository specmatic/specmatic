openapi: 3.0.3
info:
  title: "Request/Response body - deeply nested object"
  version: "1.0"
paths:
  /companies:
    get:
      operationId: listCompanies
      responses:
        '200':
          description: Company list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - name
                    - headquarters
                  properties:
                    name:
                      type: string
                    headquarters:
                      type: object
                      required:
                        - city
                        - coordinates
                      properties:
                        city:
                          type: string
                        coordinates:
                          type: object
                          required:
                            - lat
                            - lon
                          properties:
                            lat:
                              type: number
                            lon:
                              type: number
    post:
      operationId: createCompany
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - headquarters
              properties:
                name:
                  type: string
                headquarters:
                  type: object
                  required:
                    - city
                    - coordinates
                  properties:
                    city:
                      type: string
                    coordinates:
                      type: object
                      required:
                        - lat
                        - lon
                      properties:
                        lat:
                          type: number
                        lon:
                          type: number
      responses:
        '201':
          description: Created
