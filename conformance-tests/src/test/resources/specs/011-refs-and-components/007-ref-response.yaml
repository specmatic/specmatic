openapi: 3.0.3
info:
  title: "$ref to component response"
  version: "1.0"
paths:
  /widgets:
    get:
      operationId: listWidgets
      responses:
        '200':
          description: Widget list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - name
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
    post:
      operationId: createWidget
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
            examples:
              ERROR:
                value:
                  something: else
      responses:
        '201':
          description: Widget created
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - name
                properties:
                  id:
                    type: integer
                  name:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
components:
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            type: object
            required:
              - error
            properties:
              error:
                type: string
          examples:
            ERROR:
              value:
                error: "Invalid request body"
