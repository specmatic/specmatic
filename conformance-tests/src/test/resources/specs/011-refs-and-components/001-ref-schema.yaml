openapi: 3.0.3
x-specmatic-spec-ref: 'OAS 3.0.3 Reference Object — `$ref` to a schema in components: https://spec.openapis.org/oas/v3.0.3.html#reference-object'
info:
  title: "$ref to component schema"
  version: "1.0"
paths:
  /pets:
    get:
      operationId: listPets
      responses:
        '200':
          description: Pet list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
    post:
      operationId: createPet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pet'
      responses:
        '201':
          description: Created
components:
  schemas:
    Pet:
      type: object
      required:
        - name
        - species
      properties:
        name:
          type: string
        species:
          type: string
