openapi: 3.0.3
info:
  title: "Integer enum"
  version: "1.0"
paths:
  /ratings:
    get:
      operationId: listRatings
      responses:
        '200':
          description: Rating list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - item
                    - stars
                  properties:
                    item:
                      type: string
                    stars:
                      type: integer
                      enum:
                        - 1
                        - 2
                        - 3
                        - 4
                        - 5
    post:
      operationId: createRating
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - item
                - stars
              properties:
                item:
                  type: string
                stars:
                  type: integer
                  enum:
                    - 1
                    - 2
                    - 3
                    - 4
                    - 5
      responses:
        '201':
          description: Created
