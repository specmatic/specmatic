openapi: 3.0.3
info:
  title: "Enum in query parameter"
  version: "1.0"
paths:
  /items:
    get:
      operationId: listItems
      parameters:
        - name: status
          in: query
          required: true
          schema:
            type: string
            enum:
              - active
              - inactive
              - archived
      responses:
        '200':
          description: Item list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - name
                    - status
                  properties:
                    name:
                      type: string
                    status:
                      type: string
                      enum:
                        - active
                        - inactive
                        - archived
