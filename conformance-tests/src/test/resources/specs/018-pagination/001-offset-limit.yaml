openapi: 3.0.3
x-specmatic-spec-ref: 'Conventional offset/limit pagination expressed via OAS 3.0.3 Parameter Objects: https://spec.openapis.org/oas/v3.0.3.html#parameter-object'
info:
  title: "Pagination - offset and limit"
  version: "1.0"
paths:
  /items:
    get:
      operationId: listItems
      summary: List items with offset/limit pagination
      parameters:
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated items
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                  - total
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - name
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                  total:
                    type: integer
                  offset:
                    type: integer
                  limit:
                    type: integer
