openapi: 3.0.3
info:
  title: "Nullable - integer property"
  version: "1.0"
paths:
  /inventory/{sku}:
    get:
      operationId: getInventory
      parameters:
        - name: sku
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Inventory item
          content:
            application/json:
              schema:
                type: object
                required:
                  - sku
                  - name
                  - quantity
                properties:
                  sku:
                    type: string
                  name:
                    type: string
                  quantity:
                    type: integer
                    nullable: true
