openapi: 3.0.3
info:
  title: "Nullable - object property"
  version: "1.0"
paths:
  /shipments/{id}:
    get:
      operationId: getShipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Shipment details
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - status
                  - tracking
                properties:
                  id:
                    type: integer
                  status:
                    type: string
                  tracking:
                    nullable: true
                    type: object
                    properties:
                      carrier:
                        type: string
                      trackingNumber:
                        type: string
