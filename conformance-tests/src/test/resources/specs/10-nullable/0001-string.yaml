openapi: 3.0.3
info:
  title: "Nullable - string property"
  version: "1.0"
paths:
  /users/{id}:
    get:
      operationId: getUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                type: object
                required:
                  - firstName
                  - lastName
                  - middleName
                properties:
                  firstName:
                    type: string
                  lastName:
                    type: string
                  middleName:
                    type: string
                    nullable: true
