openapi: 3.0.3
info:
  title: "Header parameter - string type"
  version: "1.0"
paths:
  /resources:
    get:
      operationId: listResources
      summary: List resources with API key header
      parameters:
        - name: X-Api-Key
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Resources list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - name
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
    post:
      operationId: createResource
      parameters:
        - name: X-Api-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
      responses:
        '201':
          description: Created
