openapi: 3.0.3
info:
  title: "Header parameter - optional"
  version: "1.0"
paths:
  /notifications:
    get:
      operationId: listNotifications
      summary: List notifications with optional correlation ID
      parameters:
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Notifications list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - message
                  properties:
                    id:
                      type: integer
                    message:
                      type: string
    post:
      operationId: createNotification
      parameters:
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
      responses:
        '201':
          description: Created
