openapi: 3.0.3
x-specmatic-spec-ref: 'OAS 3.0.3 Parameter Object — header parameter combined with path parameter: https://spec.openapis.org/oas/v3.0.3.html#parameter-object'
info:
  title: "Header parameter combined with path parameter"
  version: "1.0"
paths:
  /tenants/{tenantId}/users:
    get:
      operationId: listTenantUsers
      summary: List users for a tenant with auth header
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: integer
        - name: X-Api-Key
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - name
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
    post:
      operationId: createTenantUser
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: integer
        - name: X-Api-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
      responses:
        '201':
          description: Created
