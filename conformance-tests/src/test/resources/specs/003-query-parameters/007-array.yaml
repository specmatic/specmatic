openapi: 3.0.3
info:
  title: "Query parameter - array of strings"
  version: "1.0"
paths:
  /events:
    get:
      operationId: listEvents
      summary: List events filtered by tags
      parameters:
        - name: tags
          in: query
          required: true
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Events list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - name
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
    post:
      operationId: createEvent
      parameters:
        - name: tags
          in: query
          required: true
          schema:
            type: array
            items:
              type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
      responses:
        '201':
          description: Created
