openapi: 3.0.3
x-specmatic-spec-ref: 'OAS 3.0.3 Parameter Object — query parameter, integer: https://spec.openapis.org/oas/v3.0.3.html#parameter-object'
info:
  title: "Query parameter - integer type"
  version: "1.0"
paths:
  /orders:
    get:
      operationId: listOrders
      summary: List orders filtered by status code
      parameters:
        - name: statusCode
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Matching orders
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - statusCode
                  properties:
                    id:
                      type: integer
                    statusCode:
                      type: integer
    post:
      operationId: createOrder
      parameters:
        - name: statusCode
          in: query
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - statusCode
              properties:
                statusCode:
                  type: integer
      responses:
        '201':
          description: Created
