openapi: 3.0.3
info:
  title: "Mix of empty body (204) and JSON body responses"
  version: "1.0"
paths:
  /tasks:
    get:
      operationId: listTasks
      responses:
        '200':
          description: Task list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - title
                  properties:
                    id:
                      type: integer
                    title:
                      type: string
    post:
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
              properties:
                title:
                  type: string
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - title
                properties:
                  id:
                    type: integer
                  title:
                    type: string
  /tasks/{id}:
    delete:
      operationId: deleteTask
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted
