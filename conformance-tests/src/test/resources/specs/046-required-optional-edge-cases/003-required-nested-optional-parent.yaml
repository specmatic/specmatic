openapi: 3.0.3
info:
  title: "Required fields in optional nested object"
  version: "1.0"
paths:
  /profiles:
    get:
      operationId: listProfiles
      responses:
        '200':
          description: Profile list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                    address:
                      type: object
                      required:
                        - street
                        - city
                      properties:
                        street:
                          type: string
                        city:
                          type: string
                        zip:
                          type: string
    post:
      operationId: createProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                address:
                  type: object
                  required:
                    - street
                    - city
                  properties:
                    street:
                      type: string
                    city:
                      type: string
                    zip:
                      type: string
      responses:
        '201':
          description: Created
