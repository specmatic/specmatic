openapi: 3.0.3
info:
  title: "Path parameter - integer type"
  version: "1.0"
paths:
  /orders/{orderId}:
    get:
      operationId: getOrder
      summary: Get order by integer ID
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                type: object
                required:
                  - orderId
                  - status
                properties:
                  orderId:
                    type: integer
                  status:
                    type: string
    post:
      operationId: createOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - orderId
                - status
              properties:
                orderId:
                  type: integer
                status:
                  type: string
      responses:
        '201':
          description: Created
