openapi: 3.0.3
x-specmatic-spec-ref: 'OAS 3.0.3 Path Templating — path parameter with both literal prefix and suffix: https://spec.openapis.org/oas/v3.0.3.html#path-templating'
info:
  title: "Path parameter - prefix and suffix around parameter"
  version: "1.0"
paths:
  /reports/report-{reportId}-summary:
    get:
      operationId: getReportSummary
      summary: Get report summary with prefix and suffix in path
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Report summary
          content:
            application/json:
              schema:
                type: object
                required:
                  - reportId
                  - title
                  - total
                properties:
                  reportId:
                    type: integer
                  title:
                    type: string
                  total:
                    type: number
    post:
      operationId: createReportSummary
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reportId
                - title
                - total
              properties:
                reportId:
                  type: integer
                title:
                  type: string
                total:
                  type: number
      responses:
        '201':
          description: Created
