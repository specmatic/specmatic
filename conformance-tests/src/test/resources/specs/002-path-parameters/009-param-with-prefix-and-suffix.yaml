openapi: 3.0.3
info:
  title: Path parameter - prefix and suffix around parameter
  version: '1.0'
paths:
  /reports/report-{reportId}-summary:
    get:
      operationId: getReportSummary
      summary: Get report summary with prefix and suffix in path
      parameters:
      - name: reportId
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Report summary
          content:
            application/json:
              schema:
                type: object
                required:
                - reportId
                - title
                - total
                properties:
                  reportId:
                    type: integer
                  title:
                    type: string
                  total:
                    type: number
              examples:
                example1:
                  value:
                    reportId: 0
                    title: value1
                    total: 0
                example2:
                  value:
                    reportId: 50
                    title: value2
                    total: 50
    post:
      operationId: createReportSummary
      parameters:
      - name: reportId
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - reportId
              - title
              - total
              properties:
                reportId:
                  type: integer
                title:
                  type: string
                total:
                  type: number
            examples:
              example1:
                value:
                  reportId: 0
                  title: value1
                  total: 0
              example2:
                value:
                  reportId: 50
                  title: value2
                  total: 50
      responses:
        '201':
          description: Created
