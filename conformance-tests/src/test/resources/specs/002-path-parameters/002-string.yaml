openapi: 3.0.3
x-specmatic-spec-ref: 'OAS 3.0.3 Path Templating — string path parameter (RFC 6570): https://spec.openapis.org/oas/v3.0.3.html#path-templating'
info:
  title: "Path parameter - string type"
  version: "1.0"
paths:
  /users/{username}:
    get:
      operationId: getUser
      summary: Get user by username
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                type: object
                required:
                  - username
                  - email
                properties:
                  username:
                    type: string
                  email:
                    type: string
    post:
      operationId: createUser
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - email
              properties:
                username:
                  type: string
                email:
                  type: string
      responses:
        '201':
          description: Created
