openapi: 3.0.3
info:
  title: "Nested resource path"
  version: "1.0"
paths:
  /organizations/{orgId}/teams/{teamId}/members:
    get:
      operationId: listTeamMembers
      summary: List members of a team in an organization
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of team members
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - name
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
