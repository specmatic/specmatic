openapi: 3.0.3
x-specmatic-spec-ref: 'OAS 3.0.3 Path Templating — nested resources with parent/child path parameters: https://spec.openapis.org/oas/v3.0.3.html#path-templating'
info:
  title: "Nested resource path"
  version: "1.0"
paths:
  /organizations/{orgId}/teams/{teamId}/members:
    get:
      operationId: listTeamMembers
      summary: List members of a team in an organization
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of team members
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - name
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
    post:
      operationId: createTeamMembers
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
                - name
              properties:
                id:
                  type: integer
                name:
                  type: string
      responses:
        '201':
          description: Created
