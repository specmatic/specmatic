openapi: 3.0.3
info:
  title: "Circular reference - self-referencing schema"
  version: "1.0"
paths:
  /categories:
    get:
      operationId: listCategories
      responses:
        '200':
          description: Category tree
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
    post:
      operationId: createCategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Category'
      responses:
        '201':
          description: Created
components:
  schemas:
    Category:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
        name:
          type: string
        parent:
          $ref: '#/components/schemas/Category'
