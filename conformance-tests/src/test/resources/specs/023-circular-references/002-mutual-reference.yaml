openapi: 3.0.3
info:
  title: "Circular reference - mutual reference between schemas"
  version: "1.0"
paths:
  /authors:
    get:
      operationId: listAuthors
      responses:
        '200':
          description: Author list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Author'
    post:
      operationId: createAuthor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Author'
      responses:
        '201':
          description: Created
components:
  schemas:
    Author:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
        name:
          type: string
        books:
          type: array
          items:
            $ref: '#/components/schemas/Book'
    Book:
      type: object
      required:
        - id
        - title
      properties:
        id:
          type: integer
        title:
          type: string
        author:
          $ref: '#/components/schemas/Author'
