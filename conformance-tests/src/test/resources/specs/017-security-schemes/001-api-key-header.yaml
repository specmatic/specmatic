openapi: 3.0.3
x-specmatic-spec-ref: 'OAS 3.0.3 Security Scheme Object — apiKey in header: https://spec.openapis.org/oas/v3.0.3.html#security-scheme-object'
info:
  title: "Security scheme - API key in header"
  version: "1.0"
paths:
  /items:
    get:
      operationId: listItems
      security:
        - apiKey: []
      responses:
        '200':
          description: Items list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - name
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
    post:
      operationId: createItem
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
      responses:
        '201':
          description: Created
components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-Api-Key
