openapi: 3.0.3
info:
  title: "Security scheme - HTTP bearer token"
  version: "1.0"
paths:
  /accounts:
    get:
      operationId: listAccounts
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Account list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - name
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
    post:
      operationId: createAccount
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
      responses:
        '201':
          description: Created
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
