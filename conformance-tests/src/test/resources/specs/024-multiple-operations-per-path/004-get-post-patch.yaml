openapi: 3.0.3
info:
  title: "Multiple operations - GET, POST, PATCH on same path"
  version: "1.0"
paths:
  /items/{id}:
    get:
      operationId: getItem
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Item detail
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - name
                  - status
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  status:
                    type: string
    post:
      operationId: replaceItem
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - status
              properties:
                name:
                  type: string
                status:
                  type: string
      responses:
        '200':
          description: Replaced
    patch:
      operationId: patchItem
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                status:
                  type: string
      responses:
        '200':
          description: Patched
