openapi: 3.1.0
x-specmatic-spec-ref: 'OAS 3.1 — `$ref` with sibling keywords (allowed unlike 3.0.x): https://spec.openapis.org/oas/v3.1.1.html#reference-object'
info:
  title: "OpenAPI 3.1 - $ref with sibling properties"
  version: "1.0"
paths:
  /orders:
    get:
      operationId: listOrders
      responses:
        '200':
          description: Order list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
                  description: "A customer order"
    post:
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Order'
              description: "Order to create"
      responses:
        '201':
          description: Created
components:
  schemas:
    Order:
      type: object
      required:
        - id
        - product
        - quantity
      properties:
        id:
          type: integer
        product:
          type: string
        quantity:
          type: integer
