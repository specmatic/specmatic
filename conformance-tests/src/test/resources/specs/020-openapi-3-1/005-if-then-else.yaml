openapi: 3.1.0
x-specmatic-expect-failure-request-bodies: "invalid request bodies: error=[: required property 'cardNumber' not found, : required property 'bankAccount' not found]"
x-specmatic-spec-ref: "JSON Schema if/then/else conditional subschemas (3.1 aligns with JSON Schema 2020-12). See OAS 3.1 § Schema Object: https://spec.openapis.org/oas/v3.1.0.html#schema-object"
info:
  title: "OpenAPI 3.1 - if/then/else conditional schema"
  version: "1.0"
paths:
  /payments:
    get:
      operationId: listPayments
      responses:
        '200':
          description: Payment list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - method
                    - amount
                  properties:
                    id:
                      type: integer
                    method:
                      type: string
                      enum:
                        - card
                        - bank_transfer
                    amount:
                      type: number
                    cardNumber:
                      type: string
                    bankAccount:
                      type: string
                  if:
                    properties:
                      method:
                        const: "card"
                  then:
                    required:
                      - cardNumber
                  else:
                    required:
                      - bankAccount
    post:
      operationId: createPayment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
                - method
                - amount
              properties:
                id:
                  type: integer
                method:
                  type: string
                  enum:
                    - card
                    - bank_transfer
                amount:
                  type: number
                cardNumber:
                  type: string
                bankAccount:
                  type: string
              if:
                properties:
                  method:
                    const: "card"
              then:
                required:
                  - cardNumber
              else:
                required:
                  - bankAccount
      responses:
        '201':
          description: Created
