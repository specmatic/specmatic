x-specmatic-expect-failure-response-bodies: "invalid request/response error=[/members: must contain at least 1 element(s) that passes these validations: {\"type\":\"object\",\"required\":[\"role\"],\"properties\":{\"role\":{\"const\":\"lead\"}}}]"
