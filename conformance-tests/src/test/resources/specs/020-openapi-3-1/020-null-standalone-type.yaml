openapi: 3.1.0
x-specmatic-spec-ref: 'JSON Schema 2020-12 — `type: "null"` as a standalone type: https://json-schema.org/draft/2020-12/json-schema-core#name-type'
info:
  title: "OpenAPI 3.1 - standalone null type"
  version: "1.0"
paths:
  /events:
    get:
      operationId: listEvents
      responses:
        '200':
          description: Event list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
    post:
      operationId: createEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Event'
      responses:
        '201':
          description: Created
components:
  schemas:
    Event:
      type: object
      required:
        - id
        - name
        - deletedAt
      properties:
        id:
          type: integer
        name:
          type: string
        deletedAt:
          type: "null"
