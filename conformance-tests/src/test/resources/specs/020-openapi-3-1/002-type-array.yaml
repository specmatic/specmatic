openapi: 3.1.0
x-specmatic-spec-ref: 'OAS 3.1 / JSON Schema 2020-12 — `type` as an array of types: https://json-schema.org/draft/2020-12/json-schema-core#name-type'
info:
  title: "OpenAPI 3.1 - type as array (union types)"
  version: "1.0"
paths:
  /settings:
    get:
      operationId: listSettings
      responses:
        '200':
          description: Settings list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - key
                    - value
                  properties:
                    key:
                      type: string
                    value:
                      type:
                        - string
                        - integer
                        - boolean
    post:
      operationId: createSetting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - key
                - value
              properties:
                key:
                  type: string
                value:
                  type:
                    - string
                    - integer
                    - boolean
      responses:
        '201':
          description: Created
