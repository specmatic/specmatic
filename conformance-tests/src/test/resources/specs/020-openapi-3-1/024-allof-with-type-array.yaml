openapi: 3.1.0
x-specmatic-spec-ref: 'JSON Schema 2020-12 — `allOf` combined with `type` array: https://json-schema.org/draft/2020-12/json-schema-core#name-allof'
info:
  title: "OpenAPI 3.1 - allOf with type arrays"
  version: "1.0"
paths:
  /employees:
    get:
      operationId: listEmployees
      responses:
        '200':
          description: Employee list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Employee'
    post:
      operationId: createEmployee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Employee'
      responses:
        '201':
          description: Created
components:
  schemas:
    Person:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        nickname:
          type:
            - string
            - "null"
    Employee:
      allOf:
        - $ref: '#/components/schemas/Person'
        - type: object
          required:
            - employeeId
            - department
          properties:
            employeeId:
              type: integer
            department:
              type: string
            managerId:
              type:
                - integer
                - "null"
