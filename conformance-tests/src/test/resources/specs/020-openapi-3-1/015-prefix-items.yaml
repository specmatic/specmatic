openapi: 3.1.0
x-specmatic-expect-failure-request-bodies: "invalid request/responses that don't respect prefixItems type"
x-specmatic-expect-failure-response-bodies: "invalid request/responses that don't respect prefixItems type"
x-specmatic-spec-ref: "JSON Schema prefixItems for tuple validation: https://json-schema.org/draft/2020-12/json-schema-core#name-prefixitems"
info:
  title: "OpenAPI 3.1 - prefixItems tuple validation"
  version: "1.0"
paths:
  /coordinates:
    get:
      operationId: listCoordinates
      responses:
        '200':
          description: Coordinate list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Coordinate'
    post:
      operationId: createCoordinate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Coordinate'
      responses:
        '201':
          description: Created
components:
  schemas:
    Coordinate:
      type: object
      required:
        - label
        - position
      properties:
        label:
          type: string
        position:
          type: array
          prefixItems:
            - type: number
            - type: number
          items: false
