openapi: 3.0.3
info:
  title: Request/Response body - integer property
  version: '1.0'
paths:
  /counters:
    get:
      operationId: listCounters
      responses:
        '200':
          description: Counter list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - name
                  - value
                  properties:
                    name:
                      type: string
                    value:
                      type: integer
              examples:
                example1:
                  value:
                  - name: value1
                    value: 0
                example2:
                  value:
                  - name: value2
                    value: 50
    post:
      operationId: createCounter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - value
              properties:
                name:
                  type: string
                value:
                  type: integer
            examples:
              example1:
                value:
                  name: value1
                  value: 0
              example2:
                value:
                  name: value2
                  value: 50
      responses:
        '201':
          description: Created
