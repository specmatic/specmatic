openapi: 3.0.3
info:
  title: Request/Response body - nested object
  version: '1.0'
paths:
  /contacts:
    get:
      operationId: listContacts
      responses:
        '200':
          description: Contact list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - name
                  - address
                  properties:
                    name:
                      type: string
                    address:
                      type: object
                      required:
                      - street
                      - city
                      - zip
                      properties:
                        street:
                          type: string
                        city:
                          type: string
                        zip:
                          type: string
              examples:
                example1:
                  value:
                  - name: value1
                    address:
                      street: value1
                      city: value1
                      zip: value1
                example2:
                  value:
                  - name: value2
                    address:
                      street: value2
                      city: value2
                      zip: value2
    post:
      operationId: createContact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - address
              properties:
                name:
                  type: string
                address:
                  type: object
                  required:
                  - street
                  - city
                  - zip
                  properties:
                    street:
                      type: string
                    city:
                      type: string
                    zip:
                      type: string
            examples:
              example1:
                value:
                  name: value1
                  address:
                    street: value1
                    city: value1
                    zip: value1
              example2:
                value:
                  name: value2
                  address:
                    street: value2
                    city: value2
                    zip: value2
      responses:
        '201':
          description: Created
