openapi: 3.0.3
info:
  title: Request/Response body - mixed primitive types
  version: '1.0'
paths:
  /products:
    get:
      operationId: listProducts
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - name
                  - quantity
                  - price
                  - inStock
                  properties:
                    name:
                      type: string
                    quantity:
                      type: integer
                    price:
                      type: number
                    inStock:
                      type: boolean
              examples:
                example1:
                  value:
                  - name: value1
                    quantity: 0
                    price: 0
                    inStock: true
                example2:
                  value:
                  - name: value2
                    quantity: 50
                    price: 50
                    inStock: false
    post:
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - quantity
              - price
              - inStock
              properties:
                name:
                  type: string
                quantity:
                  type: integer
                price:
                  type: number
                inStock:
                  type: boolean
            examples:
              example1:
                value:
                  name: value1
                  quantity: 0
                  price: 0
                  inStock: true
              example2:
                value:
                  name: value2
                  quantity: 50
                  price: 50
                  inStock: false
      responses:
        '201':
          description: Created
