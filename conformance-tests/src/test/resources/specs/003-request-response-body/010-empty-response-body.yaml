openapi: 3.0.3
info:
  title: Request/Response body - empty response body (204)
  version: '1.0'
paths:
  /notifications:
    post:
      operationId: markNotificationsRead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - ids
              properties:
                ids:
                  type: array
                  items:
                    type: integer
            examples:
              example1:
                value:
                  ids:
                  - 0
              example2:
                value:
                  ids:
                  - 50
      responses:
        '204':
          description: No content
