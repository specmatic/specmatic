openapi: 3.0.3
info:
  title: Request/Response body - optional properties
  version: '1.0'
paths:
  /users:
    get:
      operationId: listUsers
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - id
                  - name
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    bio:
                      type: string
                    age:
                      type: integer
              examples:
                example1:
                  value:
                  - id: 1
                    name: value1
                    bio: A short bio
                    age: 25
                example2:
                  value:
                  - id: 50
                    name: value2
    post:
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - id
              - name
              properties:
                id:
                  type: integer
                name:
                  type: string
                bio:
                  type: string
                age:
                  type: integer
            examples:
              example1:
                value:
                  id: 1
                  name: value1
                  bio: A short bio
                  age: 25
              example2:
                value:
                  id: 50
                  name: value2
      responses:
        '201':
          description: Created
