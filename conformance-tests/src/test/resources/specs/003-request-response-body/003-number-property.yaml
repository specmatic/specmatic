openapi: 3.0.3
info:
  title: Request/Response body - number property
  version: '1.0'
paths:
  /readings:
    get:
      operationId: listReadings
      responses:
        '200':
          description: Reading list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - sensor
                  - value
                  properties:
                    sensor:
                      type: string
                    value:
                      type: number
              examples:
                example1:
                  value:
                  - sensor: value1
                    value: 0
                example2:
                  value:
                  - sensor: value2
                    value: 50
    post:
      operationId: createReading
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - sensor
              - value
              properties:
                sensor:
                  type: string
                value:
                  type: number
            examples:
              example1:
                value:
                  sensor: value1
                  value: 0
              example2:
                value:
                  sensor: value2
                  value: 50
      responses:
        '201':
          description: Created
