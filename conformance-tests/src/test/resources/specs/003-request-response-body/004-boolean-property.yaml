openapi: 3.0.3
info:
  title: Request/Response body - boolean property
  version: '1.0'
paths:
  /features:
    get:
      operationId: listFeatures
      responses:
        '200':
          description: Feature flag list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - name
                  - enabled
                  properties:
                    name:
                      type: string
                    enabled:
                      type: boolean
              examples:
                example1:
                  value:
                  - name: value1
                    enabled: true
                example2:
                  value:
                  - name: value2
                    enabled: false
    post:
      operationId: createFeature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - enabled
              properties:
                name:
                  type: string
                enabled:
                  type: boolean
            examples:
              example1:
                value:
                  name: value1
                  enabled: true
              example2:
                value:
                  name: value2
                  enabled: false
      responses:
        '201':
          description: Created
