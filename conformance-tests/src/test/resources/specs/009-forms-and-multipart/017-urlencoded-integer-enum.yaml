openapi: 3.0.3
x-specmatic-spec-ref: 'OAS 3.0.3 Encoding — application/x-www-form-urlencoded with integer `enum`: https://spec.openapis.org/oas/v3.0.3.html#encoding-object'
info:
  title: "URL-encoded form with integer enum field"
  version: "1.0"
paths:
  /priority-tickets:
    post:
      operationId: createPriorityTicket
      summary: Create a ticket with an integer priority enum
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - title
                - priority
              properties:
                title:
                  type: string
                priority:
                  type: integer
                  enum:
                    - 1
                    - 2
                    - 3
                    - 4
                    - 5
      responses:
        '201':
          description: Ticket created
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                properties:
                  id:
                    type: integer
