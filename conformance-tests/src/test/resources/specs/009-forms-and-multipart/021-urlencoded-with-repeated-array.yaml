openapi: 3.0.3
x-specmatic-spec-ref: 'OAS 3.0.3 Encoding — application/x-www-form-urlencoded with repeated array (form/explode): https://spec.openapis.org/oas/v3.0.3.html#encoding-object'
info:
  title: "URL-encoded form with repeated array field"
  version: "1.0"
paths:
  /tags:
    post:
      operationId: addTags
      summary: Add tags to a resource using repeated form fields
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - resource
                - tags
              properties:
                resource:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Tags added
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                properties:
                  id:
                    type: integer
