openapi: 3.0.3
info:
  title: "URL-encoded form submission"
  version: "1.0"
paths:
  /login:
    post:
      operationId: loginUser
      summary: Submit login credentials via URL-encoded form
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                required:
                  - token
                properties:
                  token:
                    type: string
