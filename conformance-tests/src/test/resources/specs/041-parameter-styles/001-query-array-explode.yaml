openapi: 3.0.3
info:
  title: "Query parameter array with explode"
  version: "1.0"
paths:
  /search:
    get:
      operationId: search
      parameters:
        - name: tags
          in: query
          required: true
          explode: true
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
