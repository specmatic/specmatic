openapi: 3.0.3
info:
  title: "Path parameter with label style"
  version: "1.0"
paths:
  /colors/{color}:
    get:
      operationId: getColor
      parameters:
        - name: color
          in: path
          required: true
          style: label
          schema:
            type: string
      responses:
        '200':
          description: Color detail
          content:
            application/json:
              schema:
                type: object
                required:
                  - name
                  - hex
                properties:
                  name:
                    type: string
                  hex:
                    type: string
