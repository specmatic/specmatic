openapi: 3.0.3
info:
  title: "anyOf with object and array types"
  version: "1.0"
paths:
  /responses:
    get:
      operationId: listResponses
      responses:
        '200':
          description: Response list
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    anyOf:
                      - type: object
                        required:
                          - id
                          - name
                        properties:
                          id:
                            type: integer
                          name:
                            type: string
                      - type: array
                        items:
                          type: object
                          required:
                            - id
                            - name
                          properties:
                            id:
                              type: integer
                            name:
                              type: string
    post:
      operationId: createResponse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - data
              properties:
                data:
                  anyOf:
                    - type: object
                      required:
                        - id
                        - name
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                    - type: array
                      items:
                        type: object
                        required:
                          - id
                          - name
                        properties:
                          id:
                            type: integer
                          name:
                            type: string
      responses:
        '201':
          description: Created
