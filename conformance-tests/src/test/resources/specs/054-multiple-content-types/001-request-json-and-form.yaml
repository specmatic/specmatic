openapi: 3.0.3
info:
  title: "Request accepting both JSON and form-urlencoded"
  version: "1.0"
paths:
  /submissions:
    post:
      operationId: createSubmission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - value
              properties:
                name:
                  type: string
                value:
                  type: string
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - name
                - value
              properties:
                name:
                  type: string
                value:
                  type: string
      responses:
        '201':
          description: Created
    get:
      operationId: listSubmissions
      responses:
        '200':
          description: Submission list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - name
                    - value
                  properties:
                    name:
                      type: string
                    value:
                      type: string
