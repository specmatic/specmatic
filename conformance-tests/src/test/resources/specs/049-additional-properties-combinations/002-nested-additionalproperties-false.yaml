openapi: 3.0.3
info:
  title: "Nested objects both with additionalProperties false"
  version: "1.0"
paths:
  /configs:
    get:
      operationId: listConfigs
      responses:
        '200':
          description: Config list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - name
                    - settings
                  properties:
                    name:
                      type: string
                    settings:
                      type: object
                      required:
                        - enabled
                        - level
                      properties:
                        enabled:
                          type: boolean
                        level:
                          type: integer
                      additionalProperties: false
                  additionalProperties: false
    post:
      operationId: createConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - settings
              properties:
                name:
                  type: string
                settings:
                  type: object
                  required:
                    - enabled
                    - level
                  properties:
                    enabled:
                      type: boolean
                    level:
                      type: integer
                  additionalProperties: false
              additionalProperties: false
      responses:
        '201':
          description: Created
