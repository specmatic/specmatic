openapi: 3.0.3
info:
  title: "Schema - flat object"
  version: "1.0"
paths:
  /book:
    get:
      operationId: getBook
      responses:
        '200':
          description: A book
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
components:
  schemas:
    Book:
      type: object
      required:
        - title
        - author
        - isbn
        - pages
      properties:
        title:
          type: string
        author:
          type: string
        isbn:
          type: string
        pages:
          type: integer
