openapi: 3.0.3
info:
  title: "Schema - nested arrays (matrix)"
  version: "1.0"
paths:
  /matrix:
    get:
      operationId: getMatrix
      responses:
        '200':
          description: Matrix data
          content:
            application/json:
              schema:
                type: object
                required:
                  - rows
                properties:
                  rows:
                    type: array
                    items:
                      type: array
                      items:
                        type: integer
