openapi: 3.0.3
info:
  title: "Schema - object with array property"
  version: "1.0"
paths:
  /classroom:
    get:
      operationId: getClassroom
      responses:
        '200':
          description: Classroom
          content:
            application/json:
              schema:
                type: object
                required:
                  - roomNumber
                  - students
                properties:
                  roomNumber:
                    type: string
                  students:
                    type: array
                    items:
                      type: string
