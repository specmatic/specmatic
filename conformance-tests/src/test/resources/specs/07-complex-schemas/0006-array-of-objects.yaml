openapi: 3.0.3
info:
  title: "Schema - array of objects"
  version: "1.0"
paths:
  /employees:
    get:
      operationId: listEmployees
      responses:
        '200':
          description: Employee list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - name
                    - department
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    department:
                      type: string
