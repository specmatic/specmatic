openapi: 3.0.3
info:
  title: "Schema - deeply nested object (3 levels)"
  version: "1.0"
paths:
  /organization:
    get:
      operationId: getOrganization
      responses:
        '200':
          description: Organization
          content:
            application/json:
              schema:
                type: object
                required:
                  - name
                  - headquarters
                properties:
                  name:
                    type: string
                  headquarters:
                    type: object
                    required:
                      - country
                      - office
                    properties:
                      country:
                        type: string
                      office:
                        type: object
                        required:
                          - building
                          - floor
                        properties:
                          building:
                            type: string
                          floor:
                            type: integer
