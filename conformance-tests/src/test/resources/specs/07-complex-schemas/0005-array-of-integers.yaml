openapi: 3.0.3
info:
  title: "Schema - array of integers"
  version: "1.0"
paths:
  /scores:
    get:
      operationId: getScores
      responses:
        '200':
          description: Scores
          content:
            application/json:
              schema:
                type: object
                required:
                  - scores
                properties:
                  scores:
                    type: array
                    items:
                      type: integer
