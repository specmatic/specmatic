openapi: 3.0.3
info:
  title: Format - json-pointer (JSON Schema)
  version: '1.0'
paths:
  /patches:
    get:
      operationId: listPatches
      responses:
        '200':
          description: Patch list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - op
                  - path
                  properties:
                    op:
                      type: string
                    path:
                      type: string
                      format: json-pointer
              examples:
                example1:
                  value:
                  - op: value1
                    path: /data/name
                example2:
                  value:
                  - op: value2
                    path: /items/0/id
    post:
      operationId: createPatches
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - op
              - path
              properties:
                op:
                  type: string
                path:
                  type: string
                  format: json-pointer
            examples:
              example1:
                value:
                  op: value1
                  path: /data/name
              example2:
                value:
                  op: value2
                  path: /items/0/id
      responses:
        '201':
          description: Created
