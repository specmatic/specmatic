openapi: 3.0.3
info:
  title: Format - regex (JSON Schema)
  version: '1.0'
paths:
  /validation-rules:
    get:
      operationId: listRules
      responses:
        '200':
          description: Rule list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - field
                  - pattern
                  properties:
                    field:
                      type: string
                    pattern:
                      type: string
                      format: regex
              examples:
                example1:
                  value:
                  - field: value1
                    pattern: ^[a-z]+$
                example2:
                  value:
                  - field: value2
                    pattern: ^\d{3}-\d{4}$
    post:
      operationId: createRules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - field
              - pattern
              properties:
                field:
                  type: string
                pattern:
                  type: string
                  format: regex
            examples:
              example1:
                value:
                  field: value1
                  pattern: ^[a-z]+$
              example2:
                value:
                  field: value2
                  pattern: ^\d{3}-\d{4}$
      responses:
        '201':
          description: Created
