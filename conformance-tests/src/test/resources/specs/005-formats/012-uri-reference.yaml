            schema:
              type: object
              required:
              - label
              - href
              properties:
                label:
                  type: string
                href:
                  type: string
                  format: uri-reference
            examples:
              example1:
                value:
                  label: value1
                  href: /api/v1/items
              example2:
                value:
                  label: value2
