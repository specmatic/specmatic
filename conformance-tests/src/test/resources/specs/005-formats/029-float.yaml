openapi: 3.0.3
info:
  title: Format - float (OpenAPI)
  version: '1.0'
paths:
  /sensor:
    get:
      operationId: getSensor
      responses:
        '200':
          description: Sensor reading
          content:
            application/json:
              schema:
                type: object
                required:
                - humidity
                - pressure
                properties:
                  humidity:
                    type: number
                    format: float
                  pressure:
                    type: number
                    format: float
              examples:
                example1:
                  value:
                    humidity: 0
                    pressure: 0
                example2:
                  value:
                    humidity: 50
                    pressure: 50
    post:
      operationId: createSensor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - humidity
              - pressure
              properties:
                humidity:
                  type: number
                  format: float
                pressure:
                  type: number
                  format: float
            examples:
              example1:
                value:
                  humidity: 0
                  pressure: 0
              example2:
                value:
                  humidity: 50
                  pressure: 50
      responses:
        '201':
          description: Created
