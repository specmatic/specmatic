openapi: 3.0.3
info:
  title: Format - date-time (JSON Schema)
  version: '1.0'
paths:
  /events:
    get:
      operationId: listEvents
      responses:
        '200':
          description: Event list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - title
                  - startedAt
                  properties:
                    title:
                      type: string
                    startedAt:
                      type: string
                      format: date-time
              examples:
                example1:
                  value:
                  - title: value1
                    startedAt: '2024-01-15T10:30:00Z'
                example2:
                  value:
                  - title: value2
                    startedAt: '2025-06-30T18:45:00Z'
    post:
      operationId: createEvents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - title
              - startedAt
              properties:
                title:
                  type: string
                startedAt:
                  type: string
                  format: date-time
            examples:
              example1:
                value:
                  title: value1
                  startedAt: '2024-01-15T10:30:00Z'
              example2:
                value:
                  title: value2
                  startedAt: '2025-06-30T18:45:00Z'
      responses:
        '201':
          description: Created
