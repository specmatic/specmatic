openapi: 3.0.3
info:
  title: Format - media-range (OpenAPI)
  version: '1.0'
paths:
  /content-types:
    get:
      operationId: listContentTypes
      responses:
        '200':
          description: Supported content types
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - label
                  - mediaType
                  properties:
                    label:
                      type: string
                    mediaType:
                      type: string
                      format: media-range
              examples:
                example1:
                  value:
                  - label: value1
                    mediaType: application/json
                example2:
                  value:
                  - label: value2
                    mediaType: text/html
    post:
      operationId: createContentTypes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - label
              - mediaType
              properties:
                label:
                  type: string
                mediaType:
                  type: string
                  format: media-range
            examples:
              example1:
                value:
                  label: value1
                  mediaType: application/json
              example2:
                value:
                  label: value2
                  mediaType: text/html
      responses:
        '201':
          description: Created
