openapi: 3.0.3
info:
  title: Format - uint8 (OpenAPI)
  version: '1.0'
paths:
  /pixel:
    get:
      operationId: getPixel
      responses:
        '200':
          description: Pixel value
          content:
            application/json:
              schema:
                type: object
                required:
                - red
                - green
                - blue
                properties:
                  red:
                    type: integer
                    format: uint8
                  green:
                    type: integer
                    format: uint8
                  blue:
                    type: integer
                    format: uint8
              examples:
                example1:
                  value:
                    red: 0
                    green: 0
                    blue: 0
                example2:
                  value:
                    red: 127
                    green: 127
                    blue: 127
    post:
      operationId: createPixel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - red
              - green
              - blue
              properties:
                red:
                  type: integer
                  format: uint8
                green:
                  type: integer
                  format: uint8
                blue:
                  type: integer
                  format: uint8
            examples:
              example1:
                value:
                  red: 0
                  green: 0
                  blue: 0
              example2:
                value:
                  red: 127
                  green: 127
                  blue: 127
      responses:
        '201':
          description: Created
