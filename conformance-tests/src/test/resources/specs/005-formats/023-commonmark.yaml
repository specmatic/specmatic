openapi: 3.0.3
info:
  title: Format - commonmark (OpenAPI)
  version: '1.0'
paths:
  /articles:
    get:
      operationId: listArticles
      responses:
        '200':
          description: Article list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - title
                  - body
                  properties:
                    title:
                      type: string
                    body:
                      type: string
                      format: commonmark
              examples:
                example1:
                  value:
                  - title: value1
                    body: '# Title


                      Paragraph text.'
                example2:
                  value:
                  - title: value2
                    body: '**Bold** and *italic* text.'
    post:
      operationId: createArticles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - title
              - body
              properties:
                title:
                  type: string
                body:
                  type: string
                  format: commonmark
            examples:
              example1:
                value:
                  title: value1
                  body: '# Title


                    Paragraph text.'
              example2:
                value:
                  title: value2
                  body: '**Bold** and *italic* text.'
      responses:
        '201':
          description: Created
