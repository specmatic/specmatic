openapi: 3.0.3
info:
  title: Format - duration (JSON Schema)
  version: '1.0'
paths:
  /tasks:
    get:
      operationId: listTasks
      responses:
        '200':
          description: Task list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - name
                  - elapsed
                  properties:
                    name:
                      type: string
                    elapsed:
                      type: string
                      format: duration
              examples:
                example1:
                  value:
                  - name: value1
                    elapsed: P1DT2H
                example2:
                  value:
                  - name: value2
                    elapsed: P3M15D
    post:
      operationId: createTasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - elapsed
              properties:
                name:
                  type: string
                elapsed:
                  type: string
                  format: duration
            examples:
              example1:
                value:
                  name: value1
                  elapsed: P1DT2H
              example2:
                value:
                  name: value2
                  elapsed: P3M15D
      responses:
        '201':
          description: Created
