openapi: 3.0.3
info:
  title: "Format - duration (JSON Schema)"
  version: "1.0"
paths:
  /tasks:
    get:
      operationId: listTasks
      responses:
        '200':
          description: Task list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - name
                    - elapsed
                  properties:
                    name:
                      type: string
                    elapsed:
                      type: string
                      format: duration
    post:
      operationId: createTasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - elapsed
              properties:
                name:
                  type: string
                elapsed:
                  type: string
                  format: duration
      responses:
        '201':
          description: Created
