openapi: 3.0.3
info:
  title: Format - hostname (JSON Schema)
  version: '1.0'
paths:
  /servers:
    get:
      operationId: listServers
      responses:
        '200':
          description: Server list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - name
                  - host
                  properties:
                    name:
                      type: string
                    host:
                      type: string
                      format: hostname
              examples:
                example1:
                  value:
                  - name: value1
                    host: api.example.com
                example2:
                  value:
                  - name: value2
                    host: db.internal.net
    post:
      operationId: createServers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - host
              properties:
                name:
                  type: string
                host:
                  type: string
                  format: hostname
            examples:
              example1:
                value:
                  name: value1
                  host: api.example.com
              example2:
                value:
                  name: value2
                  host: db.internal.net
      responses:
        '201':
          description: Created
