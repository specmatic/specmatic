openapi: 3.0.3
info:
  title: Format - uri-template (JSON Schema)
  version: '1.0'
paths:
  /templates:
    get:
      operationId: listTemplates
      responses:
        '200':
          description: URI templates
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - name
                  - template
                  properties:
                    name:
                      type: string
                    template:
                      type: string
                      format: uri-template
              examples:
                example1:
                  value:
                  - name: value1
                    template: /users/{userId}
                example2:
                  value:
                  - name: value2
                    template: /items/{itemId}/details
    post:
      operationId: createTemplates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - template
              properties:
                name:
                  type: string
                template:
                  type: string
                  format: uri-template
            examples:
              example1:
                value:
                  name: value1
                  template: /users/{userId}
              example2:
                value:
                  name: value2
                  template: /items/{itemId}/details
      responses:
        '201':
          description: Created
