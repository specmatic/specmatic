openapi: 3.0.3
info:
  title: Format - idn-email (JSON Schema)
  version: '1.0'
paths:
  /subscribers:
    get:
      operationId: listSubscribers
      responses:
        '200':
          description: Subscriber list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - name
                  - email
                  properties:
                    name:
                      type: string
                    email:
                      type: string
                      format: idn-email
              examples:
                example1:
                  value:
                  - name: value1
                    email: alice@example.com
                example2:
                  value:
                  - name: value2
                    email: bob@example.org
    post:
      operationId: createSubscribers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - email
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: idn-email
            examples:
              example1:
                value:
                  name: value1
                  email: alice@example.com
              example2:
                value:
                  name: value2
                  email: bob@example.org
      responses:
        '201':
          description: Created
