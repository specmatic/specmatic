openapi: 3.0.3
info:
  title: Format - double (OpenAPI)
  version: '1.0'
paths:
  /coordinates:
    get:
      operationId: getCoordinates
      responses:
        '200':
          description: Coordinates
          content:
            application/json:
              schema:
                type: object
                required:
                - latitude
                - longitude
                properties:
                  latitude:
                    type: number
                    format: double
                  longitude:
                    type: number
                    format: double
              examples:
                example1:
                  value:
                    latitude: 0
                    longitude: 0
                example2:
                  value:
                    latitude: 50
                    longitude: 50
    post:
      operationId: createCoordinates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - latitude
              - longitude
              properties:
                latitude:
                  type: number
                  format: double
                longitude:
                  type: number
                  format: double
            examples:
              example1:
                value:
                  latitude: 0
                  longitude: 0
              example2:
                value:
                  latitude: 50
                  longitude: 50
      responses:
        '201':
          description: Created
