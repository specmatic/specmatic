openapi: 3.0.3
info:
  title: Format - html (OpenAPI)
  version: '1.0'
paths:
  /pages:
    get:
      operationId: listPages
      responses:
        '200':
          description: Page list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - title
                  - content
                  properties:
                    title:
                      type: string
                    content:
                      type: string
                      format: html
              examples:
                example1:
                  value:
                  - title: value1
                    content: <p>Hello world</p>
                example2:
                  value:
                  - title: value2
                    content: <div><strong>Content</strong></div>
    post:
      operationId: createPages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - title
              - content
              properties:
                title:
                  type: string
                content:
                  type: string
                  format: html
            examples:
              example1:
                value:
                  title: value1
                  content: <p>Hello world</p>
              example2:
                value:
                  title: value2
                  content: <div><strong>Content</strong></div>
      responses:
        '201':
          description: Created
