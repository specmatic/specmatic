openapi: 3.0.3
info:
  title: Format - password (OpenAPI)
  version: '1.0'
paths:
  /login:
    post:
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - username
              - password
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
            examples:
              example1:
                value:
                  username: value1
                  password: s3cret!Pass1
              example2:
                value:
                  username: value2
                  password: An0ther$ecure2
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                required:
                - token
                properties:
                  token:
                    type: string
              examples:
                example1:
                  value:
                    token: value1
                example2:
                  value:
                    token: value2
