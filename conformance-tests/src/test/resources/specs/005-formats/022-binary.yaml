openapi: 3.0.3
info:
  title: Format - binary (OpenAPI)
  version: '1.0'
paths:
  /blobs:
    get:
      operationId: listBlobs
      responses:
        '200':
          description: Blob list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - id
                  - content
                  properties:
                    id:
                      type: string
                    content:
                      type: string
                      format: binary
              examples:
                example1:
                  value:
                  - id: value1
                    content: '0110100001101001'
                example2:
                  value:
                  - id: value2
                    content: '0111011101101111'
    post:
      operationId: createBlobs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - id
              - content
              properties:
                id:
                  type: string
                content:
                  type: string
                  format: binary
            examples:
              example1:
                value:
                  id: value1
                  content: '0110100001101001'
              example2:
                value:
                  id: value2
                  content: '0111011101101111'
      responses:
        '201':
          description: Created
