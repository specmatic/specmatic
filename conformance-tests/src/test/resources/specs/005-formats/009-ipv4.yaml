openapi: 3.0.3
info:
  title: Format - ipv4 (JSON Schema)
  version: '1.0'
paths:
  /allowlist:
    get:
      operationId: getAllowlist
      responses:
        '200':
          description: Allowed IPs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - label
                  - ip
                  properties:
                    label:
                      type: string
                    ip:
                      type: string
                      format: ipv4
              examples:
                example1:
                  value:
                  - label: value1
                    ip: 192.168.1.1
                example2:
                  value:
                  - label: value2
                    ip: 10.0.0.42
    post:
      operationId: createAllowlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - label
              - ip
              properties:
                label:
                  type: string
                ip:
                  type: string
                  format: ipv4
            examples:
              example1:
                value:
                  label: value1
                  ip: 192.168.1.1
              example2:
                value:
                  label: value2
                  ip: 10.0.0.42
      responses:
        '201':
          description: Created
