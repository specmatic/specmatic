openapi: 3.0.3
info:
  title: Format - time (JSON Schema)
  version: '1.0'
paths:
  /alarms:
    get:
      operationId: listAlarms
      responses:
        '200':
          description: Alarm list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - label
                  - time
                  properties:
                    label:
                      type: string
                    time:
                      type: string
                      format: time
              examples:
                example1:
                  value:
                  - label: value1
                    time: 10:30:00Z
                example2:
                  value:
                  - label: value2
                    time: 18:45:00Z
    post:
      operationId: createAlarms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - label
              - time
              properties:
                label:
                  type: string
                time:
                  type: string
                  format: time
            examples:
              example1:
                value:
                  label: value1
                  time: 10:30:00Z
              example2:
                value:
                  label: value2
                  time: 18:45:00Z
      responses:
        '201':
          description: Created
