    get:
      operationId: listMappings
      responses:
        '200':
          description: Mapping list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - source
                  - target
                  properties:
                    source:
                      type: string
                      format: relative-json-pointer
                    target:
                      type: string
              examples:
                example1:
                  value:
                  - source: 0/name
                    target: value1
                example2:
                  value:
                  - source: 1/id
                    target: value2
    post:
      operationId: createMappings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - source
              - target
              properties:
                source:
                  type: string
                  format: relative-json-pointer
                target:
                  type: string
            examples:
              example1:
                value:
                  source: 0/name
                  target: value1
              example2:
                value:
                  source: 1/id
                  target: value2
      responses:
        '201':
          description: Created
