openapi: 3.0.3
info:
  title: Format - iri (JSON Schema)
  version: '1.0'
paths:
  /resources:
    get:
      operationId: listResources
      responses:
        '200':
          description: Resource list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - name
                  - location
                  properties:
                    name:
                      type: string
                    location:
                      type: string
                      format: iri
              examples:
                example1:
                  value:
                  - name: value1
                    location: https://example.com/resource/1
                example2:
                  value:
                  - name: value2
                    location: https://example.org/item/2
    post:
      operationId: createResources
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - location
              properties:
                name:
                  type: string
                location:
                  type: string
                  format: iri
            examples:
              example1:
                value:
                  name: value1
                  location: https://example.com/resource/1
              example2:
                value:
                  name: value2
                  location: https://example.org/item/2
      responses:
        '201':
          description: Created
