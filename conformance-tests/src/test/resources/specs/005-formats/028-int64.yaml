openapi: 3.0.3
info:
  title: Format - int64 (OpenAPI)
  version: '1.0'
paths:
  /statistics:
    get:
      operationId: getStatistics
      responses:
        '200':
          description: Statistics
          content:
            application/json:
              schema:
                type: object
                required:
                - totalBytes
                - totalRecords
                properties:
                  totalBytes:
                    type: integer
                    format: int64
                  totalRecords:
                    type: integer
                    format: int64
              examples:
                example1:
                  value:
                    totalBytes: -9223372036854775808
                    totalRecords: -9223372036854775808
                example2:
                  value:
                    totalBytes: -1
                    totalRecords: -1
    post:
      operationId: createStatistics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - totalBytes
              - totalRecords
              properties:
                totalBytes:
                  type: integer
                  format: int64
                totalRecords:
                  type: integer
                  format: int64
            examples:
              example1:
                value:
                  totalBytes: -9223372036854775808
                  totalRecords: -9223372036854775808
              example2:
                value:
                  totalBytes: -1
                  totalRecords: -1
      responses:
        '201':
          description: Created
