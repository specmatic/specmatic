openapi: 3.0.3
x-specmatic-spec-ref: 'OAS 3.0.3 Parameter Object — `example` on a parameter: https://spec.openapis.org/oas/v3.0.3.html#parameter-object'
info:
  title: "Example on parameter"
  version: "1.0"
paths:
  /orders/{orderId}:
    get:
      operationId: getOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
          example: 42
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - status
                properties:
                  id:
                    type: integer
                  status:
                    type: string
