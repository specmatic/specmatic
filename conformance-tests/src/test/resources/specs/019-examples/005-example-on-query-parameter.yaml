openapi: 3.0.3
info:
  title: "Example on query parameter"
  version: "1.0"
paths:
  /search:
    get:
      operationId: searchItems
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          example: specmatic
        - name: limit
          in: query
          required: false
          schema:
            type: integer
          example: 10
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - title
                  properties:
                    id:
                      type: integer
                    title:
                      type: string
