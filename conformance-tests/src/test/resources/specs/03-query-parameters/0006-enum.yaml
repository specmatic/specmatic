openapi: 3.0.3
info:
  title: "Query parameter with enum"
  version: "1.0"
paths:
  /reports:
    get:
      operationId: listReports
      summary: List reports filtered by status enum
      parameters:
        - name: status
          in: query
          required: true
          schema:
            type: string
            enum:
              - draft
              - published
              - archived
      responses:
        '200':
          description: Report list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - status
                  properties:
                    id:
                      type: integer
                    status:
                      type: string
