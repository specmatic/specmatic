openapi: 3.0.3
info:
  title: "Integer query parameter"
  version: "1.0"
paths:
  /events:
    get:
      operationId: listEvents
      summary: List events with integer limit
      parameters:
        - name: limit
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Event list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - title
                  properties:
                    id:
                      type: integer
                    title:
                      type: string
