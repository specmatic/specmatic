openapi: 3.0.3
info:
  title: "Required string query parameter"
  version: "1.0"
paths:
  /search:
    get:
      operationId: search
      summary: Search with required query parameter
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                required:
                  - query
                  - count
                properties:
                  query:
                    type: string
                  count:
                    type: integer
