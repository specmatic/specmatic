openapi: 3.0.3
info:
  title: "Multiple query parameters"
  version: "1.0"
paths:
  /logs:
    get:
      operationId: searchLogs
      summary: Search logs with multiple query params
      parameters:
        - name: level
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: true
          schema:
            type: integer
        - name: ascending
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - message
                    - level
                  properties:
                    message:
                      type: string
                    level:
                      type: string
