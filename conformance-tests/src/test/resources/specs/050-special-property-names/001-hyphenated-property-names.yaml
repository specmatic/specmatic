openapi: 3.0.3
info:
  title: "Properties with hyphens in names"
  version: "1.0"
paths:
  /items:
    get:
      operationId: listItems
      responses:
        '200':
          description: Item list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - item-id
                    - item-name
                    - created-at
                  properties:
                    item-id:
                      type: integer
                    item-name:
                      type: string
                    created-at:
                      type: string
                      format: date-time
    post:
      operationId: createItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - item-id
                - item-name
                - created-at
              properties:
                item-id:
                  type: integer
                item-name:
                  type: string
                created-at:
                  type: string
                  format: date-time
      responses:
        '201':
          description: Created
