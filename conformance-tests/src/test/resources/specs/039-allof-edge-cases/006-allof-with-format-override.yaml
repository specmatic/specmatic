openapi: 3.0.3
info:
  title: "allOf where one schema adds format to another's string property"
  version: "1.0"
paths:
  /contacts:
    get:
      operationId: listContacts
      responses:
        '200':
          description: Contact list
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                    - type: object
                      required:
                        - name
                        - email
                      properties:
                        name:
                          type: string
                        email:
                          type: string
                    - type: object
                      properties:
                        email:
                          type: string
                          format: email
    post:
      operationId: createContact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required:
                    - name
                    - email
                  properties:
                    name:
                      type: string
                    email:
                      type: string
                - type: object
                  properties:
                    email:
                      type: string
                      format: email
      responses:
        '201':
          description: Created
