openapi: 3.0.3
info:
  title: "Nullable field within allOf"
  version: "1.0"
paths:
  /employees:
    get:
      operationId: listEmployees
      responses:
        '200':
          description: Employee list
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                    - type: object
                      required:
                        - name
                      properties:
                        name:
                          type: string
                    - type: object
                      required:
                        - department
                      properties:
                        department:
                          type: string
                          nullable: true
    post:
      operationId: createEmployee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                - type: object
                  required:
                    - department
                  properties:
                    department:
                      type: string
                      nullable: true
      responses:
        '201':
          description: Created
