openapi: 3.0.3
info:
  title: "Schema composition - string enum"
  version: "1.0"
paths:
  /orders:
    get:
      operationId: listOrders
      responses:
        '200':
          description: Order list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - status
                  properties:
                    id:
                      type: integer
                    status:
                      type: string
                      enum:
                        - pending
                        - shipped
                        - delivered
                        - cancelled
    post:
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
                - status
              properties:
                id:
                  type: integer
                status:
                  type: string
                  enum:
                    - pending
                    - shipped
                    - delivered
                    - cancelled
      responses:
        '201':
          description: Created
