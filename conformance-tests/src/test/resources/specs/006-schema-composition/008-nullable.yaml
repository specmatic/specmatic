openapi: 3.0.3
x-specmatic-spec-ref: 'OAS 3.0.3 Schema Object — `nullable: true` (3.0.x-only flag): https://spec.openapis.org/oas/v3.0.3.html#schema-object'
info:
  title: "Schema composition - nullable"
  version: "1.0"
paths:
  /employees:
    get:
      operationId: listEmployees
      responses:
        '200':
          description: Employee list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - name
                    - managerId
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    managerId:
                      type: integer
                      nullable: true
    post:
      operationId: createEmployee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
                - name
                - managerId
              properties:
                id:
                  type: integer
                name:
                  type: string
                managerId:
                  type: integer
                  nullable: true
      responses:
        '201':
          description: Created
