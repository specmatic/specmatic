openapi: 3.0.3
info:
  title: "Schema composition - anyOf"
  version: "1.0"
paths:
  /search-results:
    get:
      operationId: listSearchResults
      responses:
        '200':
          description: Search result list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - title
                    - score
                  properties:
                    title:
                      type: string
                    score:
                      anyOf:
                        - type: integer
                        - type: number
    post:
      operationId: createSearchResult
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - score
              properties:
                title:
                  type: string
                score:
                  anyOf:
                    - type: integer
                    - type: number
      responses:
        '201':
          description: Created
