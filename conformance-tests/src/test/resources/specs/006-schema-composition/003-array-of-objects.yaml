openapi: 3.0.3
info:
  title: "Schema composition - array of objects"
  version: "1.0"
paths:
  /tasks:
    get:
      operationId: listTasks
      responses:
        '200':
          description: Task list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - title
                    - done
                  properties:
                    id:
                      type: integer
                    title:
                      type: string
                    done:
                      type: boolean
    post:
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
                - title
                - done
              properties:
                id:
                  type: integer
                title:
                  type: string
                done:
                  type: boolean
      responses:
        '201':
          description: Created
