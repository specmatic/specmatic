openapi: 3.0.3
info:
  title: "Schema composition - array of strings"
  version: "1.0"
paths:
  /tags:
    get:
      operationId: listTags
      responses:
        '200':
          description: Tag list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
    post:
      operationId: createTags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
      responses:
        '201':
          description: Created
