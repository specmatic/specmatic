                        - subject
                      properties:
                        type:
                          type: string
                          enum:
                            - email
                        email:
                          type: string
                        subject:
                          type: string
                    - type: object
                      required:
                        - type
                        - phone
                        - message
                      properties:
                        type:
                          type: string
                          enum:
                            - sms
                        phone:
                          type: string
                        message:
                          type: string
    post:
      operationId: createNotification
      requestBody:
