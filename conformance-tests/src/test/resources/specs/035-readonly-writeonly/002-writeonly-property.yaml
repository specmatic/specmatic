openapi: 3.0.3
info:
  title: "writeOnly property"
  version: "1.0"
paths:
  /accounts:
    get:
      operationId: listAccounts
      responses:
        '200':
          description: Account list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - username
                    - password
                  properties:
                    username:
                      type: string
                    password:
                      type: string
                      writeOnly: true
    post:
      operationId: createAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
                  writeOnly: true
      responses:
        '201':
          description: Created
