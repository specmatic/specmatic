openapi: 3.0.3
info:
  title: "Constraint - array maxItems"
  version: "1.0"
paths:
  /favorites:
    post:
      operationId: setFavorites
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - items
              properties:
                items:
                  type: array
                  maxItems: 5
                  items:
                    type: string
      responses:
        '200':
          description: Favorites saved
          content:
            application/json:
              schema:
                type: object
                required:
                  - count
                properties:
                  count:
                    type: integer
