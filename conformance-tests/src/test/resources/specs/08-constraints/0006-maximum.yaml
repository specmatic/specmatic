openapi: 3.0.3
info:
  title: "Constraint - integer maximum"
  version: "1.0"
paths:
  /ratings:
    post:
      operationId: submitRating
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - rating
              properties:
                rating:
                  type: integer
                  maximum: 5
      responses:
        '201':
          description: Rating submitted
          content:
            application/json:
              schema:
                type: object
                required:
                  - rating
                properties:
                  rating:
                    type: integer
