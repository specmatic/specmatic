openapi: 3.0.3
info:
  title: "Constraint - array minItems"
  version: "1.0"
paths:
  /playlists:
    post:
      operationId: createPlaylist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - songs
              properties:
                name:
                  type: string
                songs:
                  type: array
                  minItems: 1
                  items:
                    type: string
      responses:
        '201':
          description: Playlist created
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                properties:
                  id:
                    type: integer
