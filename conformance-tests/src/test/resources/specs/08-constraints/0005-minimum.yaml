openapi: 3.0.3
info:
  title: "Constraint - integer minimum"
  version: "1.0"
paths:
  /ages:
    post:
      operationId: submitAge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - age
              properties:
                age:
                  type: integer
                  minimum: 0
      responses:
        '201':
          description: Age submitted
          content:
            application/json:
              schema:
                type: object
                required:
                  - age
                properties:
                  age:
                    type: integer
