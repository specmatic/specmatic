openapi: 3.0.3
info:
  title: "Constraint - array uniqueItems"
  version: "1.0"
paths:
  /labels:
    post:
      operationId: setLabels
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - labels
              properties:
                labels:
                  type: array
                  uniqueItems: true
                  items:
                    type: string
      responses:
        '200':
          description: Labels saved
          content:
            application/json:
              schema:
                type: object
                required:
                  - count
                properties:
                  count:
                    type: integer
