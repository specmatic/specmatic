openapi: 3.0.3
info:
  title: "Constraint - string pattern (regex)"
  version: "1.0"
paths:
  /codes:
    post:
      operationId: createCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  pattern: "^[A-Z]{3}-[0-9]{4}$"
      responses:
        '201':
          description: Code created
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                properties:
                  code:
                    type: string
