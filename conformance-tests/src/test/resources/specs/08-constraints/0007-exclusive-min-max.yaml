openapi: 3.0.3
info:
  title: "Constraint - exclusiveMinimum and exclusiveMaximum"
  version: "1.0"
paths:
  /percentages:
    post:
      operationId: submitPercentage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - value
              properties:
                value:
                  type: number
                  minimum: 0
                  exclusiveMinimum: true
                  maximum: 100
                  exclusiveMaximum: true
      responses:
        '201':
          description: Percentage submitted
          content:
            application/json:
              schema:
                type: object
                required:
                  - value
                properties:
                  value:
                    type: number
