openapi: 3.0.3
x-specmatic-expect-failure-loop: "Mock fails to load with error: Could not determine name for an xml node"
x-specmatic-expect-failure-operations: "Mock fails to load with error: Could not determine name for an xml node"
info:
  title: "Content negotiation - different request and response types"
  version: "1.0"
paths:
  /transforms:
    post:
      operationId: transformData
      summary: Accept XML request, return JSON response
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              required:
                - input
              properties:
                input:
                  type: string
      responses:
        '200':
          description: Transformed result
          content:
            application/json:
              schema:
                type: object
                required:
                  - output
                properties:
                  output:
                    type: string
