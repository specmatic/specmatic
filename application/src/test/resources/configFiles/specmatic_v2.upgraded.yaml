        level: "${LOG_LEVEL:DEBUG}"
        json:
          directory: "${LOG_JSON_DIR:logs/json}"
          console: "${LOG_JSON_CONSOLE:true}"
          logFilePrefix: "${LOG_JSON_PREFIX:specmatic-json}"
        text:
          directory: "${LOG_TEXT_DIR:logs/text}"
          console: "${LOG_TEXT_CONSOLE:false}"
          logFilePrefix: "${LOG_TEXT_PREFIX:specmatic-text}"
      featureFlags:
        fuzzyMatcherForPayloads: "${FUZZY:true}"
        schemaExampleDefault: "${SCHEMA_EXAMPLE_DEFAULT:true}"
        escapeSoapAction: "${ESCAPE_SOAP_ACTION:true}"
      specExamplesDirectoryTemplate: "${SPEC_EXAMPLE_TEMPLATE:<SPEC_FILE_NAME>_examples}"
      sharedExamplesDirectoryTemplate:
      - "${SHARED_EX_TEMPLATE_1:<SPEC_EACH_PARENT>_common}"
      - "${SHARED_EX_TEMPLATE_2:common}"
    test:
      schemaResiliencyTests: "${TEST_RESILIENCY:all}"
      timeoutInMilliseconds: "${TEST_TIMEOUT_MS:120000}"
      strictMode: "${TEST_STRICT:true}"
      lenientMode: "${TEST_LENIENT:false}"
      parallelism: "${TEST_PARALLELISM:4}"
      maxTestRequestCombinations: "${TEST_MAX_COMBINATIONS:40}"
      junitReportDir: "${TEST_JUNIT_DIR:reports/junit}"
      validateResponseValues: "${TEST_VALIDATE_RESPONSE:true}"
      maxTestCount: "${TEST_MAX_COUNT:200}"
    mock:
      generative: "${STUB_GENERATIVE:true}"
      delayInMilliseconds: "${STUB_DELAY_MS:10}"
      startTimeoutInMilliseconds: "${STUB_START_TIMEOUT_MS:60000}"
      hotReload: "${STUB_HOT_RELOAD:true}"
      strictMode: "${STUB_STRICT:false}"
      gracefulRestartTimeoutInMilliseconds: "${STUB_GRACEFUL_TIMEOUT_MS:15000}"
      lenientMode: "${STUB_LENIENT:true}"
    backwardCompatibility:
      baseBranch: "${BC_BASE_BRANCH:main}"
      targetPath: "${BC_TARGET_PATH:contracts/openapi}"
      repoDirectory: "${BC_REPO_DIR:.specmatic/repos/contracts}"
      strictMode: "${BC_STRICT:true}"
